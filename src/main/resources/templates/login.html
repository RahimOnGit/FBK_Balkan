<style>
    /*body {*/
    /*    background: linear-gradient(135deg, #4169E1 0%, #1E3A8A 100%);*/
    /*}*/
    .role-card {
        position: relative;
        overflow: hidden;
    }

    .role-card.active {
        border-color: hsl(var(--p));
        background: hsl(var(--p) / 0.1);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        transform: scale(1.02);
    }

    .role-card.active::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: hsl(var(--p));
        animation: slideIn 0.3s ease-out;
    }

    .role-card.active .role-icon {
        background: hsl(var(--p) / 0.2);
        transform: scale(1.1);
    }

    .role-card.active .role-icon svg {
        color: hsl(var(--p));
    }

    .role-card:not(.active) {
        opacity: 0.75;
    }

    .role-card:not(.active):hover {
        opacity: 1;
        transform: translateY(-3px);
        border-color: hsl(var(--p) / 0.5);
    }

    @keyframes slideIn {
        from {
            transform: scaleX(0);
        }
        to {
            transform: scaleX(1);
        }
    }

    .role-icon {
        transition: all 0.3s ease-in-out;
    }

    .role-checkmark {
        animation: fadeIn 0.3s ease-in-out;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: scale(0.5);
        }
        to {
            opacity: 1;
            transform: scale(1);
        }
    }
</style>

<script>
    let selectedRole = null;

    // Role selection handlers
    document.querySelectorAll('.role-card').forEach(card => {
        card.addEventListener('click', function() {
            // Remove active class from all cards
            document.querySelectorAll('.role-card').forEach(c => {
                c.classList.remove('active');
                // Hide checkmark
                const checkmark = c.querySelector('.role-checkmark');
                if (checkmark) {
                    checkmark.classList.add('hidden');
                }
            });

            // Add active class to clicked card
            this.classList.add('active');

            // Show checkmark
            const checkmark = this.querySelector('.role-checkmark');
            if (checkmark) {
                checkmark.classList.remove('hidden');
            }

            // Store selected role
            selectedRole = this.getAttribute('data-role');

            // Hide role error if shown
            document.getElementById('role-error').classList.add('hidden');

            // Enable login button
            document.getElementById('login-button').disabled = false;
        });
    });

    // Form submission handler
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('error-message');
        const roleError = document.getElementById('role-error');

        errorDiv.classList.add('hidden');
        roleError.classList.add('hidden');

        // Validate role selection
        if (!selectedRole) {
            roleError.classList.remove('hidden');
            // Scroll to role selection
            document.querySelector('.role-card').scrollIntoView({ behavior: 'smooth', block: 'center' });
            return;
        }

        // Disable button during submission
        const loginButton = document.getElementById('login-button');
        loginButton.disabled = true;
        loginButton.textContent = 'Loggar in...';

        try {
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (response.ok) {
                // Verify role matches
                if (data.role && data.role.toUpperCase() !== selectedRole) {
                    errorDiv.textContent = `Detta konto är registrerat som ${data.role === 'PARENT' ? 'Förälder' : 'Tränare'}. Vänligen välj rätt roll.`;
                    errorDiv.classList.remove('hidden');
                    loginButton.disabled = false;
                    loginButton.textContent = 'Logga in';

                    // Update role selection to match account
                    document.querySelectorAll('.role-card').forEach(c => {
                        c.classList.remove('active');
                        if (c.getAttribute('data-role') === data.role.toUpperCase()) {
                            c.classList.add('active');
                            selectedRole = data.role.toUpperCase();
                        }
                    });
                    return;
                }

                // Store token in localStorage
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify({
                    userId: data.userId,
                    email: data.email,
                    fullName: data.fullName,
                    role: data.role
                }));

                // Update navbar
                if (typeof updateNavbar === 'function') {
                    updateNavbar();
                }

                // Prevent back-button access
                window.history.replaceState(null, null, '/dashboard');

                // Redirect to dashboard
                window.location.href = '/dashboard';
            } else {
                errorDiv.textContent = data.message || data || 'Inloggning misslyckades';
                errorDiv.classList.remove('hidden');
                loginButton.disabled = false;
                loginButton.textContent = 'Logga in';
            }
        } catch (error) {
            errorDiv.textContent = 'Ett fel uppstod. Försök igen.';
            errorDiv.classList.remove('hidden');
            loginButton.disabled = false;
            loginButton.textContent = 'Logga in';
        }
    });

    // Initialize - disable login button until role is selected
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('login-button').disabled = true;
    });

</script>
