<!DOCTYPE html>
<html lang="sv" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spelschema — FBK Balkan</title>

  <!-- DaisyUI + Tailwind -->
  <link th:href="@{/css/output.css}" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Roboto+Condensed:ital,wght@0,400;0,700;1,700&display=swap" rel="stylesheet" />

  <style>
    .font-virage { font-family: 'Roboto Condensed', sans-serif; }
    .hero-glow {
      background: radial-gradient(circle at 50% 50%, rgba(245, 197, 24, 0.15) 0%, transparent 70%);
    }
    .filter-tabs::-webkit-scrollbar { display: none; }
    .filter-tabs { scrollbar-width: none; }
  </style>
</head>

<body class="bg-base-100 font-virage text-white antialiased">

<header class="sticky top-0 z-[100] bg-primary/95 backdrop-blur-md border-b border-white/10">
  <div th:replace="~{fragments/navbar::navbar}"></div>
</header>

<main>
  <!-- HERO -->
  <section class="relative bg-primary pt-16 pb-12 sm:pt-20 sm:pb-16 md:pt-24 md:pb-20 overflow-hidden">
    <div class="absolute inset-0 hero-glow"></div>
    <div class="absolute -top-24 -left-24 w-72 h-72 sm:w-96 sm:h-96 bg-secondary/10 rounded-full blur-[100px]"></div>

    <div class="container mx-auto px-4 sm:px-6 relative z-10">
      <div class="inline-flex items-center gap-2 sm:gap-3 mb-4 sm:mb-6">
        <span class="h-[1px] w-6 sm:w-8 bg-secondary"></span>
        <span class="text-secondary font-black uppercase tracking-[0.25em] sm:tracking-[0.3em] text-[10px] sm:text-xs">Säsongen 2024/25</span>
      </div>
      <h1 class="text-5xl sm:text-7xl md:text-8xl lg:text-9xl font-black italic uppercase tracking-tighter mb-3 sm:mb-4 leading-none break-words">
        Alla <span class="text-secondary">matcher</span>
      </h1>
      <p class="text-white/50 text-sm sm:text-base md:text-lg max-w-2xl uppercase tracking-wide">
        Filtrera FBK Balkans matcher på vy, tävling, lag eller motståndare.
      </p>
    </div>
  </section>

  <!-- MAIN CONTENT -->
  <section class="bg-base-100 pb-16 sm:pb-20 md:pb-24 text-primary">
    <div class="container mx-auto px-4 sm:px-6 max-w-7xl">

      <!-- ========== FILTER FORM ========== -->
      <form th:action="@{/matcher}" method="get"
            class="bg-neutral-50 border border-neutral-200 rounded-2xl p-5 sm:p-6 md:p-7 mt-8 sm:mt-10 mb-8 sm:mb-10 shadow-sm">

        <!-- View tabs (radio buttons styled as pills) -->
        <div class="filter-tabs flex items-center gap-2 mb-6 overflow-x-auto pb-1">
          <span class="text-primary/50 text-[10px] sm:text-xs font-black uppercase tracking-widest mr-2 hidden sm:inline">Visa:</span>

          <label class="cursor-pointer">
            <input type="radio" name="view" value="upcoming" class="peer sr-only"
                   th:checked="${selectedView == 'upcoming'}"
                   onchange="this.form.submit()" />
            <span class="px-4 py-2 rounded-full text-[10px] sm:text-xs font-black uppercase tracking-widest whitespace-nowrap inline-block transition
                         bg-white text-primary/60 border border-neutral-200
                         peer-checked:bg-primary peer-checked:text-white peer-checked:border-primary">
              Kommande
            </span>
          </label>

          <label class="cursor-pointer">
            <input type="radio" name="view" value="results" class="peer sr-only"
                   th:checked="${selectedView == 'results'}"
                   onchange="this.form.submit()" />
            <span class="px-4 py-2 rounded-full text-[10px] sm:text-xs font-black uppercase tracking-widest whitespace-nowrap inline-block transition
                         bg-white text-primary/60 border border-neutral-200
                         peer-checked:bg-primary peer-checked:text-white peer-checked:border-primary">
              Resultat
            </span>
          </label>

          <label class="cursor-pointer">
            <input type="radio" name="view" value="all" class="peer sr-only"
                   th:checked="${selectedView == 'all'}"
                   onchange="this.form.submit()" />
            <span class="px-4 py-2 rounded-full text-[10px] sm:text-xs font-black uppercase tracking-widest whitespace-nowrap inline-block transition
                         bg-white text-primary/60 border border-neutral-200
                         peer-checked:bg-primary peer-checked:text-white peer-checked:border-primary">
              Alla
            </span>
          </label>
        </div>

        <!-- Filter row: competition + team + search -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-3 sm:gap-4">
          <!-- Competition -->
          <div>
            <label for="competition"
                   class="block text-primary/60 text-[10px] sm:text-xs font-black uppercase tracking-widest mb-2">
              Tävling
            </label>
            <select id="competition" name="competition"
                    class="select select-bordered w-full bg-white text-primary font-bold text-sm">
              <option value="">Alla tävlingar</option>
              <option th:each="c : ${competitions}"
                      th:value="${c}"
                      th:text="${c}"
                      th:selected="${selectedCompetition != null and selectedCompetition == c}"></option>
            </select>
          </div>

          <!-- Team -->
          <div>
            <label for="team"
                   class="block text-primary/60 text-[10px] sm:text-xs font-black uppercase tracking-widest mb-2">
              FBK-lag
            </label>
            <select id="team" name="team"
                    class="select select-bordered w-full bg-white text-primary font-bold text-sm">
              <option value="">Alla lag</option>
              <option th:each="t : ${fbkTeams}"
                      th:value="${t}"
                      th:text="${t}"
                      th:selected="${selectedTeam != null and selectedTeam == t}"></option>
            </select>
          </div>

          <!-- Search -->
          <div>
            <label for="q"
                   class="block text-primary/60 text-[10px] sm:text-xs font-black uppercase tracking-widest mb-2">
              Sök motståndare
            </label>
            <input id="q" name="q" type="text"
                   placeholder="t.ex. AIK, IFK..."
                   th:value="${searchQuery}"
                   class="input input-bordered w-full bg-white text-primary font-bold text-sm placeholder:text-primary/30 placeholder:font-normal" />
          </div>
        </div>

        <!-- Action row -->
        <div class="flex flex-wrap items-center justify-between gap-3 mt-5 pt-5 border-t border-neutral-200">
          <div class="text-primary/60 text-xs sm:text-sm">
            <span class="font-black text-primary" th:text="${totalCount}">0</span>
            <span th:text="${totalCount == 1 ? 'match hittad' : 'matcher hittade'}">matcher hittade</span>
          </div>

          <div class="flex items-center gap-2 sm:gap-3">
            <a th:if="${hasFilters}" th:href="@{/matcher}"
               class="btn btn-ghost btn-sm text-primary/60 hover:text-primary font-black uppercase tracking-widest text-[10px] sm:text-xs">
              Rensa filter
            </a>
            <button type="submit"
                    class="btn btn-sm bg-primary hover:bg-primary/90 text-white border-none font-black uppercase tracking-widest text-[10px] sm:text-xs">
              Filtrera
            </button>
          </div>
        </div>
      </form>

      <!-- ========== RESULTS HEADER ========== -->
      <div class="flex items-center gap-3 sm:gap-6 mb-8 sm:mb-10">
        <h2 class="text-2xl sm:text-3xl md:text-4xl font-black italic text-primary uppercase tracking-tight whitespace-nowrap">
          <span th:if="${selectedView == 'upcoming'}">Kommande <span class="text-secondary">matcher</span></span>
          <span th:if="${selectedView == 'results'}">Senaste <span class="text-secondary">resultat</span></span>
          <span th:if="${selectedView == 'all'}">Alla <span class="text-secondary">matcher</span></span>
        </h2>
        <div class="h-[1px] flex-1 bg-neutral-200"></div>
      </div>

      <!-- ========== EMPTY STATE ========== -->
      <div th:if="${matchesByMonth == null or matchesByMonth.isEmpty()}"
           class="bg-neutral-50 border border-neutral-100 rounded-2xl p-10 sm:p-14 text-center">
        <p class="text-primary/40 font-black uppercase italic tracking-widest text-sm">
          <span th:if="${hasFilters}">Inga matcher matchar valda filter</span>
          <span th:unless="${hasFilters}">Inga matcher just nu</span>
        </p>
        <a th:if="${hasFilters}" th:href="@{/matcher}"
           class="inline-block mt-4 text-secondary hover:text-secondary/80 font-black uppercase italic tracking-widest text-xs underline underline-offset-4">
          Rensa filter →
        </a>
      </div>

      <!-- ========== MONTH GROUPS ========== -->
      <div th:unless="${matchesByMonth == null or matchesByMonth.isEmpty()}"
           class="space-y-12 sm:space-y-16">
        <div th:each="entry : ${matchesByMonth}" class="space-y-6 sm:space-y-8">
          <h3 class="text-xl sm:text-2xl md:text-3xl font-black italic text-primary uppercase tracking-tight"
              th:text="${entry.key}">APRIL 2026</h3>

          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 sm:gap-5 lg:gap-6">
            <div th:each="match : ${entry.value}">
              <!-- "played" if a real score exists on the match -->
              <div th:replace="~{fragments/match :: fixture-card(${match}, ${match.goalsScoredHomeTeam() != null and match.goalsScoredHomeTeam() ge 0})}"></div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </section>
</main>

<footer th:replace="~{fragments/footer::footer}"></footer>

</body>
</html>
