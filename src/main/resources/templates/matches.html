<!DOCTYPE html>
<html lang="sv" data-theme="corporate" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spelschema — FBK Balkan</title>

  <!-- DaisyUI + Tailwind -->
  <link th:href="@{/css/output.css}" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Roboto+Condensed:ital,wght@0,400;0,700;1,700&display=swap" rel="stylesheet" />

  <style>
    .font-virage { font-family: 'Roboto Condensed', sans-serif; }
    .hero-glow {
      background: radial-gradient(circle at 50% 50%, rgba(245, 197, 24, 0.15) 0%, transparent 70%);
    }
    .filter-tabs::-webkit-scrollbar { display: none; }
    .filter-tabs { scrollbar-width: none; }
  </style>
</head>

<body class="bg-base-100 font-virage text-white antialiased">
<div class="bg-primary">
  <div th:replace="~{fragments/navbar::navbar}"></div>

</div>

<main>
  <!-- HERO -->
  <section class="relative bg-primary pt-16 pb-12 sm:pt-20 sm:pb-16 md:pt-24 md:pb-20 overflow-hidden">
    <div class="absolute inset-0 hero-glow"></div>
    <!-- Decorative Blobs -->
    <div class="absolute -top-24 -left-24 w-72 h-72 sm:w-96 sm:h-96 bg-secondary/10 rounded-full blur-[100px]"></div>

    <div class="container mx-auto px-4 sm:px-6 relative z-10">
      <div class="inline-flex items-center gap-2 sm:gap-3 mb-4 sm:mb-6">
        <span class="h-[1px] w-6 sm:w-8 bg-secondary"></span>
        <span class="text-secondary font-black uppercase tracking-[0.25em] sm:tracking-[0.3em] text-[10px] sm:text-xs">Säsongen 2024/25</span>
      </div>
      <h1 class="text-5xl sm:text-7xl md:text-8xl lg:text-9xl font-black italic uppercase tracking-tighter mb-3 sm:mb-4 leading-none break-words">
        Spelschema <span class="text-secondary">&amp; Resultat</span>
      </h1>
      <p class="text-white/50 text-sm sm:text-base md:text-lg max-w-2xl uppercase tracking-wide">
        Följ FBK Balkans matcher — kommande och senaste resultat.
      </p>
    </div>
  </section>

  <!-- MAIN CONTENT -->
  <section class="bg-base-100 pb-16 sm:pb-20 md:pb-24 text-primary">
    <div class="container mx-auto px-4 sm:px-6 max-w-7xl">

      <!-- Section Tabs (visual) -->
      <div class="filter-tabs flex items-center justify-start sm:justify-center gap-1 sm:gap-2 mt-8 sm:mt-10 mb-8 sm:mb-10 border-b border-neutral-200 overflow-x-auto">
        <a href="#kommande"
           class="text-primary border-b-2 border-secondary pb-3 px-3 sm:px-5 font-black uppercase italic tracking-widest text-xs sm:text-sm whitespace-nowrap">Kommande</a>
        <a href="#resultat"
           class="text-primary/40 hover:text-primary border-b-2 border-transparent pb-3 px-3 sm:px-5 font-black uppercase italic tracking-widest text-xs sm:text-sm whitespace-nowrap transition-colors">Senaste resultat</a>
      </div>

      <!-- Competition Filter Pills (visual) -->
      <div class="filter-tabs flex flex-wrap items-center gap-2 mb-10 sm:mb-12">
        <span class="px-4 py-2 bg-primary text-white rounded-full text-[10px] sm:text-xs font-black uppercase tracking-widest">Alla tävlingar</span>
        <span class="px-4 py-2 bg-neutral-50 hover:bg-neutral-100 text-primary/60 rounded-full text-[10px] sm:text-xs font-black uppercase tracking-widest cursor-default">Division 2</span>
        <span class="px-4 py-2 bg-neutral-50 hover:bg-neutral-100 text-primary/60 rounded-full text-[10px] sm:text-xs font-black uppercase tracking-widest cursor-default">DM Herr</span>
        <span class="px-4 py-2 bg-neutral-50 hover:bg-neutral-100 text-primary/60 rounded-full text-[10px] sm:text-xs font-black uppercase tracking-widest cursor-default">Cup</span>
      </div>

      <!-- ===== KOMMANDE ===== -->
      <div id="kommande" class="space-y-12 sm:space-y-16 mb-20 sm:mb-24 scroll-mt-24">
        <div class="flex items-center gap-3 sm:gap-6">
          <h2 class="text-2xl sm:text-3xl md:text-4xl font-black italic text-primary uppercase tracking-tight whitespace-nowrap">
            Kommande <span class="text-secondary">matcher</span>
          </h2>
          <div class="h-[1px] flex-1 bg-neutral-200"></div>
        </div>

        <!-- Empty state -->
        <div th:if="${upcomingByMonth == null or upcomingByMonth.isEmpty()}"
             class="bg-neutral-50 border border-neutral-100 rounded-2xl p-10 sm:p-14 text-center">
          <p class="text-primary/40 font-black uppercase italic tracking-widest text-sm">
            Inga kommande matcher just nu
          </p>
        </div>

        <!-- Month groups -->
        <div th:each="entry : ${upcomingByMonth}" class="space-y-6 sm:space-y-8">
          <h3 class="text-xl sm:text-2xl md:text-3xl font-black italic text-primary uppercase tracking-tight"
              th:text="${entry.key}">APRIL 2026</h3>

          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 sm:gap-5 lg:gap-6">
            <div th:each="match : ${entry.value}">
              <div th:replace="~{fragments/match :: fixture-card(${match}, false)}"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- ===== SENASTE RESULTAT ===== -->
      <div id="resultat" class="space-y-12 sm:space-y-16 scroll-mt-24">
        <div class="flex items-center gap-3 sm:gap-6">
          <h2 class="text-2xl sm:text-3xl md:text-4xl font-black italic text-primary uppercase tracking-tight whitespace-nowrap">
            Senaste <span class="text-secondary">resultat</span>
          </h2>
          <div class="h-[1px] flex-1 bg-neutral-200"></div>
        </div>

        <!-- Empty state -->
        <div th:if="${recentByMonth == null or recentByMonth.isEmpty()}"
             class="bg-neutral-50 border border-neutral-100 rounded-2xl p-10 sm:p-14 text-center">
          <p class="text-primary/40 font-black uppercase italic tracking-widest text-sm">
            Inga senaste resultat
          </p>
        </div>

        <!-- Month groups -->
        <div th:each="entry : ${recentByMonth}" class="space-y-6 sm:space-y-8">
          <h3 class="text-xl sm:text-2xl md:text-3xl font-black italic text-primary uppercase tracking-tight"
              th:text="${entry.key}">MARS 2026</h3>

          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 sm:gap-5 lg:gap-6">
            <div th:each="match : ${entry.value}">
              <div th:replace="~{fragments/match :: fixture-card(${match}, true)}"></div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </section>

</main>

<footer th:replace="~{fragments/footer::footer}"></footer>

</body>
</html>
