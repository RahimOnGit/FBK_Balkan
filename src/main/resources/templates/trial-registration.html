<!DOCTYPE html>
<html lang="sv" data-theme="corporate" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Provträningsregistrering - FBK Balkan</title>
    <link th:href="@{/css/output.css}" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .font-virage {
            font-family: 'Roboto Condensed', sans-serif;
        }
        /* Custom focus ring for inputs to match your secondary accent */
        .input:focus, .select:focus {
            outline: none;
            border-color: oklch(var(--s));
            box-shadow: 0 0 0 1px oklch(var(--s));
        }
    </style>
</head>
<body class="min-h-screen bg-base-200 font-virage text-base-content antialiased flex flex-col">

<header class="sticky top-0 z-[100] w-full bg-primary shadow-lg">
    <div th:replace="~{fragments/navbar::navbar}"></div>
</header>

<main class="flex-grow pb-20">
    <section class="relative pt-16 pb-24 md:pt-20 md:pb-32 flex items-center justify-center overflow-hidden bg-primary">
        <div class="absolute inset-0 opacity-15">
            <div class="absolute top-0 left-0 w-[400px] h-[400px] bg-secondary rounded-full blur-[100px] -translate-x-1/2 -translate-y-1/2"></div>
            <div class="absolute bottom-0 right-0 w-[400px] h-[400px] bg-accent rounded-full blur-[100px] translate-x-1/2 translate-y-1/2"></div>
        </div>
        <div class="container mx-auto px-4 relative z-10 text-center">
            <div class="inline-block px-4 py-1 mb-4 border border-secondary/30 rounded-full bg-secondary/10 text-secondary text-sm font-bold tracking-widest uppercase">
                Bli en del av oss
            </div>
            <h1 class="text-4xl md:text-6xl font-black text-white mb-4 tracking-tighter italic uppercase">
                Provtränings<span class="text-secondary">anmälan</span>
            </h1>
            <p class="text-lg text-white/80 max-w-2xl mx-auto leading-relaxed">
                Ta första steget in i gemenskapen. Fyll i formuläret nedan så hör vi av oss så snart som möjligt.
            </p>
        </div>
    </section>

    <section class="relative z-20 -mt-16 md:-mt-24 px-4">
        <div class="container mx-auto max-w-3xl">
            <div class="card bg-base-100 shadow-2xl border border-base-200 rounded-[2rem]">
                <div class="card-body p-6 md:p-10 lg:p-12">

                    <div class="flex items-center gap-3 mb-8 pb-4 border-b border-base-200">
                        <div class="w-10 h-10 bg-secondary/10 rounded-xl flex items-center justify-center text-secondary shrink-0">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                            </svg>
                        </div>
                        <div>
                            <h2 class="text-2xl font-bold uppercase italic text-primary">Spelaruppgifter</h2>
                            <p class="text-xs text-base-content/60 uppercase tracking-wide">Fält markerade med <span class="text-error font-bold">*</span> är obligatoriska</p>
                        </div>
                    </div>

                    <form th:action="@{/trial-registration}" th:object="${trialRegistrationDTO}" method="post" class="space-y-6">

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                            <div class="form-control w-full">
                                <label class="label pb-1">
                                    <span class="label-text font-bold uppercase tracking-wide text-xs opacity-75">Barnets förnamn <span class="text-error">*</span></span>
                                </label>
                                <input class="input input-bordered w-full bg-base-100" type="text" th:field="*{firstName}" placeholder="Förnamn" required maxlength="40"/>
                                <p th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}" class="text-error text-xs mt-1 font-semibold"></p>
                            </div>
                            <div class="form-control w-full">
                                <label class="label pb-1">
                                    <span class="label-text font-bold uppercase tracking-wide text-xs opacity-75">Barnets efternamn <span class="text-error">*</span></span>
                                </label>
                                <input class="input input-bordered w-full bg-base-100" type="text" th:field="*{lastName}" placeholder="Efternamn" required maxlength="40"/>
                                <p th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}" class="text-error text-xs mt-1 font-semibold"></p>
                            </div>

                            <div class="form-control w-full">
                                <label class="label pb-1">
                                    <span class="label-text font-bold uppercase tracking-wide text-xs opacity-75">Födelsedatum <span class="text-error">*</span></span>
                                </label>
                                <input class="input input-bordered w-full bg-base-100" type="date" th:field="*{birthDate}" th:attr="min=${minBirthDate}, max=${maxBirthDate}" required />
                                <p th:if="${#fields.hasErrors('birthDate')}" class="text-error text-xs mt-1 font-semibold" th:errors="*{birthDate}"></p>
                            </div>

                            <div class="form-control w-full">
                                <label class="label pb-1">
                                    <span class="label-text font-bold uppercase tracking-wide text-xs opacity-75">Kön <span class="text-error">*</span></span>
                                </label>
                                <select class="select select-bordered w-full bg-base-100" th:field="*{gender}" required>
                                    <option value="" disabled selected>Välj kön</option>
                                    <option th:each="g : ${availableGenders}" th:value="${g}" th:text="${g.label}"></option>
                                </select>
                                <p th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}" class="text-error text-xs mt-1 font-semibold"></p>
                            </div>

                            <div class="form-control w-full">
                                <label class="label pb-1">
                                    <span class="label-text font-bold uppercase tracking-wide text-xs opacity-75">Nuvarande klubb</span>
                                </label>
                                <input class="input input-bordered w-full bg-base-100" type="text" th:field="*{currentClub}" placeholder="T.ex. Malmö FF" maxlength="40" />
                                <p th:if="${#fields.hasErrors('currentClub')}" th:errors="*{currentClub}" class="text-error text-xs mt-1 font-semibold"></p>
                            </div>

                            <div class="form-control w-full">
                                <label class="label pb-1">
                                    <span class="label-text font-bold uppercase tracking-wide text-xs opacity-75">Antal år i klubb</span>
                                </label>
                                <input class="input input-bordered w-full bg-base-100" type="number" min="0" max="20" th:field="*{clubYears}" placeholder="0" />
                                <p th:if="${#fields.hasErrors('clubYears')}" th:errors="*{clubYears}" class="text-error text-xs mt-1 font-semibold"></p>
                            </div>
                        </div>

                        <div class="divider my-2"></div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="form-control w-full">
                                <label class="label pb-1">
                                    <span class="label-text font-bold uppercase tracking-wide text-xs opacity-75">Vårdnadshavare <span class="text-error">*</span></span>
                                </label>
                                <input class="input input-bordered w-full bg-base-100" type="text" th:field="*{relativeName}" placeholder="För- och efternamn" required maxlength="40" />
                                <p th:if="${#fields.hasErrors('relativeName')}" th:errors="*{relativeName}" class="text-error text-xs mt-1 font-semibold"></p>
                            </div>

                            <div class="form-control w-full">
                                <label class="label pb-1">
                                    <span class="label-text font-bold uppercase tracking-wide text-xs opacity-75">Telefonnummer <span class="text-error">*</span></span>
                                </label>
                                <input class="input input-bordered w-full bg-base-100" type="tel" th:field="*{relativeNumber}" placeholder="070-000 00 00" required maxlength="15"/>
                                <p th:if="${#fields.hasErrors('relativeNumber')}" th:errors="*{relativeNumber}" class="text-error text-xs mt-1 font-semibold"></p>
                            </div>

                            <div class="form-control w-full md:col-span-2">
                                <label class="label pb-1">
                                    <span class="label-text font-bold uppercase tracking-wide text-xs opacity-75">E-postadress <span class="text-error">*</span></span>
                                </label>
                                <input class="input input-bordered w-full bg-base-100" type="email" th:field="*{relativeEmail}" placeholder="namn@exempel.se" required maxlength="40" />
                                <p th:if="${#fields.hasErrors('relativeEmail')}" th:errors="*{relativeEmail}" class="text-error text-xs mt-1 font-semibold"></p>
                            </div>
                        </div>

                        <div class="divider my-2"></div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="form-control w-full">
                                <label class="label pb-1">
                                    <span class="label-text font-bold uppercase tracking-wide text-xs opacity-75">Önskat provträningsdatum <span class="text-error">*</span></span>
                                </label>
                                <input class="input input-bordered w-full bg-base-100" type="date" th:field="*{preferredTrainingDate}"
                                       th:min="${#temporals.format(minTrainingDate, 'yyyy-MM-dd')}"
                                       th:max="${#temporals.format(maxTrainingDate, 'yyyy-MM-dd')}" required />
                            </div>

                            <div class="form-control w-full">
                                <label class="label pb-1">
                                    <span class="label-text font-bold uppercase tracking-wide text-xs opacity-75">Hur hittade ni hit?</span>
                                </label>
                                <select class="select select-bordered w-full bg-base-100" th:field="*{referralSource}" id="referralSource">
                                    <option value="" disabled selected>Välj källa</option>
                                    <option th:each="r : ${availableReferralSources}" th:value="${r}" th:text="${r.label}"></option>
                                </select>
                            </div>

                            <div class="form-control w-full md:col-span-2 transition-all duration-300" id="referralOtherDiv" style="display: none;">
                                <label class="label pb-1">
                                    <span class="label-text font-bold uppercase tracking-wide text-xs opacity-75">Annat (max 50 tecken)</span>
                                </label>
                                <input id="referralOtherInput" class="input input-bordered w-full bg-base-100" type="text" th:field="*{referralOther}" maxlength="50" placeholder="Berätta gärna mer...">
                            </div>
                        </div>

                        <div class="form-control mt-10 pt-4">
                            <p class="text-error text-sm mb-4 text-center font-bold" th:if="${duplicateError}" th:text="${duplicateError}"></p>
                            <button type="submit" class="btn btn-primary bg-primary  w-full rounded-full text-white font-bold uppercase italic text-lg hover:scale-[1.02] transition-transform shadow-lg h-14">
                                Skicka anmälan
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>
</main>

<footer class="mt-auto">
    <div th:replace="~{fragments/footer::footer}"></div>
</footer>

<script>
    const referralSelect = document.getElementById('referralSource');
    const referralOtherDiv = document.getElementById('referralOtherDiv');

    function toggleOtherField() {
        if (referralSelect.value === 'OTHER') {
            referralOtherDiv.style.display = 'block';
        } else {
            referralOtherDiv.style.display = 'none';
            const input = referralOtherDiv.querySelector('input');
            if (input) input.value = '';
        }
    }

    referralSelect.addEventListener('change', toggleOtherField);
    window.addEventListener('DOMContentLoaded', toggleOtherField);
</script>




</body>
</html>
