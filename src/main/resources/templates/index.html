<!DOCTYPE html>

        FBK Balkan</title>

<body class="min-h-screen ">

<div class="absolute top-0 left-0 z-[9999] right-0">

    <div th:replace="~{fragments/navbar::navbar}"></div>
</div>


<!--hero-->
<div class="hero h-[85vh]  relative  overflow-hidden">
    <!-- blurred background image -->
    <div class="absolute inset-0  bg-cover bg-center"
         th:style="${latestNews != null and latestNews.imageUrl != null} ? 'background-image: url(' + ${latestNews.imageUrl} + ')' : (${latestNews != null and latestNews.externalImageUrl != null} ? 'background-image: url(' + ${latestNews.externalImageUrl} + ')' : 'background-image: url(/images/hero-image.png)')"
         style="filter: blur(10px); transform: scale(1.05);">
    </div>
    <div class="absolute inset-0 bg-gradient-to-b from-neutral/30 via-neutral/40 to-primary"></div>
    <!--dark overlay-->
    <div class="absolute inset-0 "></div>

    <div class="hero-content text-left text-white relative z-10 w-full max-w-7xl px-8">
        <div class="flex flex-col lg:flex-row lg:justify-between w-full">
            <div class="lg:w-1/2">
                <h1 class="text-5xl lg:text-7xl text-secondary font-bold mb-5 font-virage italic">Teknik</h1>
                <h1 class="text-5xl lg:text-7xl font-bold mb-5 font-virage">Före långa bollar</h1>
                <a href="/trial-registration" class="btn btn-wide rounded-full font-virage text-xl lg:text-2xl mt-8 bg-opacity-10 text-base-100 hover:text-primary hover:bg-base-100">Registrera ditt barn</a>
                <!--              -->
                <div th:if="${latestNews != null}" class="mt-10">
                    <!--                    <a href="/news" class="text-2xl font-bold mb-4 text-secondary hover:underline">Visa alla nyheter</a>-->

                    <a th:href="@{/news/{id}(id=${latestNews.id})}"
                       class="block   rounded-lg p-4 hover:bg-white/20 transition-all mt-4">
                        <h4 th:text="${latestNews.title}" class="font-bold font-virage italic text-3xl text-white"></h4>
                        <p th:text="${#temporals.format(latestNews.createdAt, 'dd MMM yyyy')}" class="text-sm text-gray-300 mt-1"></p>
                    </a>
                </div>
                <a href="/news" class="btn btn-ghost btn-sm text-white mt-4">Visa alla nyheter &rarr;</a>

            </div>
        </div>
    </div>

</div>


<div th:replace="~{fragments/banner/banner::banner}" class="">

</div>



<!-- latest video embed -->
<div class="FBK-Balkan-youtube-embed flex justify-center  mx-auto px-8  h-screen mt-16 " >
    <iframe class="latestVideoEmbed w-full  rounded-lg"
            cid="UCAcquTaKhJu0resneu7e2_w"
            frameborder="0"
            allowfullscreen></iframe>

    <script>
        const loadVideo = (iframe) => {
            const cid = iframe.getAttribute('cid');
            const channelURL = encodeURIComponent(`https://www.youtube.com/feeds/videos.xml?channel_id=${cid}`);
            const reqURL = `https://api.rss2json.com/v1/api.json?rss_url=${channelURL}`;

            fetch(reqURL)
                .then(response => response.json())
                .then(result => {
                    const link = result.items[0].link;
                    const id = link.substr(link.indexOf("=") + 1);
                    iframe.setAttribute("src", `https://youtube.com/embed/${id}?autoplay=0&rel=0`);
                })
                .catch(error => console.log('Error loading latest video:', error));
        };

        document.querySelectorAll('.latestVideoEmbed').forEach(loadVideo);
    </script>
</div>
<!-- PREMIUM FAQ SECTION -->
<section class="bg-base-100 pt-14 sm:pt-18 pb-14">

    <div class="container mx-auto px-4 sm:px-6 lg:px-8 max-w-4xl">

        <!-- Title -->
        <div class="text-center mb-12">
            <h2 class="text-3xl sm:text-4xl md:text-5xl font-bold italic uppercase text-primary">
                <span class="text-secondary">FAQ</span>
            </h2>
            <div class="w-20 h-1 bg-secondary mx-auto mt-4 rounded-full"></div>

        <!-- FAQ items -->

        <!-- Button -->

            <a href="/faq"
               class="inline-block px-6 py-3 rounded-xl bg-secondary text-white font-bold hover:opacity-90 transition">
                Visa alla frågor →
            </a>
        </div>

    </div>
</section>

<div class="mt-8">
    <div th:replace="~{fragments/footer::footer}"></div>
</div>

</body>
</html>
