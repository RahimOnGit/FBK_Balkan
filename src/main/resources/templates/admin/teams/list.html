<!DOCTYPE html>
<html lang="sv" dir="ltr" data-theme="fbkbalkan" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lagsadministration - FBK Balkan</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link th:href="@{/css/output.css}" rel="stylesheet">
    <div th:replace="~{fragments/dashboard-sidebar :: sidebar-styles}"></div>
    <style>
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-100">

<div class="dashboard-wrapper">

    <div th:replace="~{fragments/dashboard-sidebar :: sidebar('teams')}"></div>

    <div class="dashboard-main">
        <div class="dashboard-topbar">
            <span class="dashboard-topbar-title">Lagsadministration</span>
            <a th:href="@{/team-register}"
               class="btn btn-primary btn-sm rounded-xl gap-2">
                <i class="fa-solid fa-plus"></i> Lägg till nytt lag
            </a>
        </div>

        <div class="dashboard-content">

            <!-- Alert Messages -->
            <div th:if="${success}" class="alert alert-success mb-6 shadow-lg border-none fade-in">
                <i class="fa-solid fa-check-circle"></i>
                <span th:text="${success}"></span>
            </div>
            <div th:if="${error}" class="alert alert-error mb-6 shadow-lg border-none fade-in">
                <i class="fa-solid fa-exclamation-triangle"></i>
                <span th:text="${error}"></span>
            </div>

            <p class="text-slate-500 mb-6 font-medium">Visa, redigera och ta bort lag registrerade i systemet.</p>

            <div class="card bg-base-100 shadow-lg border border-slate-200 rounded-3xl overflow-hidden">
                <div class="card-body p-0">
                    <div class="overflow-x-auto w-full">
                        <table class="table w-full text-slate-700">
                            <thead class="bg-slate-50 border-b border-slate-200 text-slate-500 uppercase text-xs tracking-wider">
                            <tr>
                                <th class="py-4 px-6 font-semibold">Lagnamn</th>
                                <th class="py-4 px-6 font-semibold">Åldersgrupp</th>
                                <th class="py-4 px-6 font-semibold">Huvudtränare</th>
                                <th class="py-4 px-6 font-semibold">Assistenttränare</th>
                                <th class="py-4 px-6 font-semibold text-center">Status</th>
                                <th class="py-4 px-6 font-semibold text-right">Åtgärder</th>
                            </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100">
                            <tr th:each="team : ${teams}" class="hover:bg-slate-50/50 transition-colors duration-150 align-middle">
                                <td class="py-4 px-6">
                                    <div class="flex items-center gap-3">
                                        <div class="w-10 h-10 rounded-full bg-primary/10 text-primary font-bold text-lg flex items-center justify-center ring-1 ring-primary/20">
                                            <span th:text="${#strings.substring(team.name, 0, 1)}">L</span>
                                        </div>
                                        <div>
                                            <div class="font-bold text-slate-800" th:text="${team.name}">Lagnamn</div>
                                            <div class="text-xs opacity-50 font-mono" th:text="'ID: ' + ${team.id}">ID: 123</div>
                                        </div>
                                    </div>
                                </td>
                                <td class="py-4 px-6" th:text="${team.ageGroup}">P16</td>
                                <td class="py-4 px-6" th:text="${team.coachName ?: '—'}">—</td>
                                <td class="py-4 px-6" th:text="${team.assistantNames ?: '—'}">—</td>
                                <td class="py-4 px-6 text-center">
                                    <span th:if="${team.active}" class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-semibold bg-emerald-50 text-emerald-600 border border-emerald-100">
                                        <span class="w-2 h-2 rounded-full bg-emerald-500"></span> Aktiv
                                    </span>
                                    <span th:unless="${team.active}" class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-semibold bg-amber-50 text-amber-600 border border-amber-100">
                                        <span class="w-2 h-2 rounded-full bg-amber-400"></span> Inaktiv
                                    </span>
                                </td>
                                <td class="py-4 px-6">
                                    <div class="flex items-center justify-end gap-1">
                                        <a th:href="@{/admin/teams/edit/{id}(id=${team.id})}"
                                           class="btn btn-sm btn-circle btn-ghost text-slate-400 hover:text-primary hover:bg-primary/10 transition-colors"
                                           title="Redigera lag">
                                            <i class="fa-regular fa-pen-to-square text-lg"></i>
                                        </a>
                                        <button type="button"
                                                th:attr="data-id=${team.id}, data-name=${team.name}"
                                                onclick="confirmDelete(this)"
                                                class="btn btn-sm btn-circle btn-ghost text-slate-400 hover:text-rose-500 hover:bg-rose-50 transition-colors"
                                                title="Ta bort lag">
                                            <i class="fa-regular fa-trash-can text-lg"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- Empty State -->
                    <div th:if="${#lists.isEmpty(teams)}" class="flex flex-col items-center justify-center py-20 text-center px-6 bg-slate-50/50">
                        <i class="fa-solid fa-users-slash text-5xl text-primary/20 mb-6"></i>
                        <h3 class="font-bold text-xl text-slate-800 mb-1">Inga lag registrerade</h3>
                        <p class="text-slate-500 text-sm mb-6 max-w-sm">Det finns inga lag i systemet ännu.</p>
                        <a th:href="@{/team-register}" class="btn btn-primary btn-sm rounded-xl shadow-md">
                            <i class="fa-solid fa-plus mr-2"></i> Skapa första laget
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    function confirmDelete(button) {
        const teamId = button.getAttribute('data-id');
        const teamName = button.getAttribute('data-name');

        Swal.fire({
            title: 'Är du säker?',
            html: `Du är på väg att ta bort laget <strong>${teamName}</strong>.<br>Denna åtgärd kan inte ångras!`,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#1e3a8a',
            cancelButtonColor: '#64748b',
            confirmButtonText: '<i class="fa-solid fa-trash-can mr-2"></i> Ja, ta bort!',
            cancelButtonText: 'Avbryt',
            customClass: { popup: 'rounded-3xl' }
        }).then((result) => {
            if (result.isConfirmed) {
                const form = document.createElement('form');
                form.method = 'POST';
                form.action = `/admin/teams/delete/${teamId}`;
                document.body.appendChild(form);
                form.submit();
            }
        });
    }
</script>

</body>
</html>
