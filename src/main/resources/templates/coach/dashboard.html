<!DOCTYPE html>
<html lang="sv" data-theme="corporate" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coach Dashboard - FBK Balkan</title>
    <link th:href="@{/css/output.css}" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap"
          rel="stylesheet">
</head>
<body class="min-h-screen bg-base-100">

<!-- Navbar -->
<div class="absolute top-0 left-0 z-[10] right-0 bg-primary">
    <div th:replace="~{fragments/navbar::navbar}"></div>
</div>

<!-- Dashboard Content -->
<div class="min-h-screen pt-32 px-4 py-12">
    <div class="mt-8">
        <div class="card bg-base-100 shadow-xl p-5">
            <div class="card-body">

                <!-- Welcome heading -->
                <h1 class="card-title text-3xl justify-center mb-4">
                    Välkommen
                    <span th:text="${coachName}"></span>!
                </h1>

                <!-- Success/Error Messages -->
                <div th:if="${successMessage}" class="alert alert-success shadow-lg mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-6 w-6" fill="none" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <span th:text="${successMessage}"></span>
                </div>

                <div th:if="${errorMessage}" class="alert alert-error shadow-lg mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-6 w-6" fill="none" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <span th:text="${errorMessage}"></span>
                </div>

                <!-- Nav buttons (Mina lag / Provträningar / Nyheter) -->
                <div th:replace="~{coach/content-fragment::dashboard-content}"></div>

                <p class="text-base-content/70 text-center mb-6">
                    Du är nu inloggad och kan hantera ditt lag, spelare, träningar och skapa nyheter
                </p>

                <!--
                     TRIAL REQUESTS SECTION
                     Visible when "Provträningar" button clicked
                     -->
                <div id="trial-section-container" class="hidden mt-6">
                    <div th:replace="~{coach/content-fragment::trial-requests}"></div>
                </div>

                <!-- ==========================================
                     TEAMS SECTION
                     Visible when "Mina lag" button clicked
                     ========================================== -->
                <div id="team-section-container" class="hidden mt-6">
                    <div th:replace="~{coach/content-fragment::team-section}"></div>
                </div>

            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<div class="mt-8">
    <div th:replace="~{fragments/footer::footer}"></div>
</div>

<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function () {

        // ===========================================
        // HANDLE MAILTO LINK FROM FLASH ATTRIBUTES
        // ===========================================
        /*[# th:if="${mailtoLink}"]*/
        var mailtoLink = /*[[${mailtoLink}]]*/ '';
        if (mailtoLink) {
            // Open email client with pre-filled message
            window.location.href = mailtoLink;
        }
        /*[/]*/

        // ===========================================
        // TOGGLE SECTION NAVIGATION
        // ===========================================
        const allBtns = document.querySelectorAll('.btn');
        let minaLagBtn = null;
        let provBtn = null;

        // Find buttons by text content
        allBtns.forEach(function (btn) {
            const text = btn.textContent.trim().toLowerCase();
            if (text === 'mina lag') minaLagBtn = btn;
            if (text === 'provträningar') provBtn = btn;
        });

        const teamContainer = document.getElementById('team-section-container');
        const trialContainer = document.getElementById('trial-section-container');

        // Toggle helper: shows target, hides other, toggles active style
        function toggleSection(target, other, clickedBtn, otherBtn) {
            const isAlreadyOpen = !target.classList.contains('hidden');

            // Hide both first
            target.classList.add('hidden');
            other.classList.add('hidden');

            // Remove active styling from both buttons
            if (clickedBtn) clickedBtn.classList.remove('btn-secondary');
            if (otherBtn) otherBtn.classList.remove('btn-secondary');
            if (clickedBtn) clickedBtn.classList.add('btn-neutral');
            if (otherBtn) otherBtn.classList.add('btn-neutral');

            // If it was closed → open it; if it was open → leave closed (toggle)
            if (!isAlreadyOpen) {
                target.classList.remove('hidden');
                if (clickedBtn) {
                    clickedBtn.classList.remove('btn-neutral');
                    clickedBtn.classList.add('btn-secondary');
                }
                target.scrollIntoView({behavior: 'smooth', block: 'start'});
            }
        }

        // Attach event listeners
        if (minaLagBtn && teamContainer) {
            minaLagBtn.addEventListener('click', function (e) {
                e.preventDefault();
                toggleSection(teamContainer, trialContainer, minaLagBtn, provBtn);
            });
        }

        if (provBtn && trialContainer) {
            provBtn.addEventListener('click', function (e) {
                e.preventDefault();
                toggleSection(trialContainer, teamContainer, provBtn, minaLagBtn);
            });
        }
    });
</script>
</body>
</html>
