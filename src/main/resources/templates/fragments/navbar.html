<header th:fragment="navbar"
        xmlns:th="http://www.thymeleaf.org"
        xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
        class="w-full z-[100] sticky top-0">

    <style>
        /* ─── Reset & Base ─────────────────────────────────────── */
        .nbr {
            background: rgba(21, 59, 111, 0.95);
            backdrop-filter: blur(18px) saturate(120%);
            -webkit-backdrop-filter: blur(18px);
            border-bottom: 1px solid rgba(245, 179, 1, 0.18);
            box-shadow: 0 2px 24px rgba(0,0,0,0.3);
            height: 70px;
            display: flex;
            align-items: center;
            padding: 0 1.5rem;
            position: relative;
        }
        @media (min-width: 1024px) { .nbr { padding: 0 3rem; } }

        /* ─── Logo ─────────────────────────────────────────────── */
        .nbr-logo img {
            height: 48px;
            width: auto;
            transition: transform 0.3s, filter 0.3s;
        }
        .nbr-logo:hover img {
            transform: scale(1.06);
            filter: drop-shadow(0 0 10px rgba(245,179,1,0.45));
        }

        /* ─── Desktop Links ─────────────────────────────────────── */
        .nbr-links {
            display: none;
            align-items: center;
            gap: 2.5rem;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }
        @media (min-width: 1024px) { .nbr-links { display: flex; } }

        .nbr-link {
            font-family: 'Roboto Condensed', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.82);
            text-decoration: none;
            padding: 0.4rem 0;
            position: relative;
            transition: color 0.25s;
            font-style: italic;
            white-space: nowrap;
        }
        .nbr-link::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: #F5B301;
            transition: width 0.3s cubic-bezier(0.4,0,0.2,1);
            border-radius: 2px;
        }
        .nbr-link:hover { color: #F5B301; }
        .nbr-link:hover::after { width: 100%; }

        /* ─── Teams Dropdown ──────────────────────────────────── */
        .nbr-dropdown-wrap { position: relative; }
        .nbr-dropdown-btn {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            font-family: 'Roboto Condensed', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.82);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.4rem 0;
            position: relative;
            transition: color 0.25s;
            font-style: italic;
        }
        .nbr-dropdown-btn::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: #F5B301;
            transition: width 0.3s cubic-bezier(0.4,0,0.2,1);
            border-radius: 2px;
        }
        .nbr-dropdown-wrap:hover .nbr-dropdown-btn { color: #F5B301; }
        .nbr-dropdown-wrap:hover .nbr-dropdown-btn::after { width: 100%; }
        .nbr-chevron { transition: transform 0.3s; }
        .nbr-dropdown-wrap:hover .nbr-chevron { transform: rotate(180deg); }

        .nbr-dropdown-menu {
            position: absolute;
            top: calc(100% + 14px);
            left: 50%;
            transform: translateX(-50%) translateY(8px);
            min-width: 200px;
            background: #153B6F;
            border: 1px solid rgba(245,179,1,0.3);
            border-radius: 14px;
            padding: 0.5rem;
            box-shadow: 0 16px 40px rgba(0,0,0,0.55);
            opacity: 0;
            visibility: hidden;
            transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
            z-index: 300;
        }
        .nbr-dropdown-menu::before {
            content: '';
            position: absolute;
            top: -6px;
            left: 50%;
            transform: translateX(-50%) rotate(45deg);
            width: 11px;
            height: 11px;
            background: #153B6F;
            border-left: 1px solid rgba(245,179,1,0.3);
            border-top: 1px solid rgba(245,179,1,0.3);
        }
        .nbr-dropdown-wrap:hover .nbr-dropdown-menu {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }
        .nbr-dropdown-item {
            display: block;
            padding: 0.7rem 1.1rem;
            border-radius: 9px;
            font-family: 'Roboto Condensed', sans-serif;
            font-weight: 700;
            font-size: 0.82rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            transition: background 0.2s, color 0.2s;
        }
        .nbr-dropdown-item:hover {
            background: rgba(245,179,1,0.12);
            color: #F5B301;
        }

        /* ─── Right Actions ──────────────────────────────────── */
        .nbr-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        /* Login button */
        .nbr-login-btn {
            display: none;
            align-items: center;
            gap: 0.5rem;
            padding: 0.55rem 1.4rem;
            background: #F5B301;
            color: #153B6F;
            border: 2px solid transparent;
            border-radius: 50px;
            font-family: 'Roboto Condensed', sans-serif;
            font-weight: 800;
            font-size: 0.82rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            box-shadow: 0 4px 14px rgba(245,179,1,0.28);
            font-style: italic;
            white-space: nowrap;
        }
        @media (min-width: 1024px) { .nbr-login-btn { display: flex; } }
        .nbr-login-btn:hover {
            background: transparent;
            color: #F5B301;
            border-color: #F5B301;
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(245,179,1,0.35);
        }

        /* Avatar / profile popover */
        .nbr-avatar-wrap { position: relative; display: none; }
        @media (min-width: 1024px) { .nbr-avatar-wrap { display: block; } }

        .nbr-avatar-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(255,255,255,0.07);
            border: 2px solid rgba(245,179,1,0.38);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: all 0.25s;
            position: relative;
        }
        .nbr-avatar-btn::after {
            content: '';
            position: absolute;
            bottom: 1px;
            right: 1px;
            width: 9px;
            height: 9px;
            background: #22c55e;
            border-radius: 50%;
            border: 2px solid rgba(21,59,111,0.9);
        }
        .nbr-avatar-btn:hover {
            border-color: #F5B301;
            background: rgba(245,179,1,0.1);
            transform: scale(1.06);
        }

        .nbr-popover {
            position: absolute;
            right: 0;
            top: calc(100% + 14px);
            min-width: 270px;
            background: #153B6F;
            border: 1.5px solid rgba(245,179,1,0.25);
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            opacity: 0;
            visibility: hidden;
            transform: translateY(10px);
            transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
            z-index: 300;
        }
        .nbr-avatar-wrap:hover .nbr-popover {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        .nbr-popover-header {
            background: rgba(0,0,0,0.2);
            padding: 1rem 1.1rem;
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }
        .nbr-popover-label {
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #F5B301;
            font-weight: 700;
        }
        .nbr-popover-username {
            font-weight: 800;
            font-size: 1rem;
            color: white;
            font-style: italic;
            margin-top: 0.2rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .nbr-popover-body { padding: 0.6rem; }
        .nbr-pop-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.65rem 0.75rem;
            border-radius: 10px;
            color: rgba(255,255,255,0.8);
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            text-decoration: none;
            font-style: italic;
            transition: background 0.2s, color 0.2s;
        }
        .nbr-pop-link:hover { background: rgba(245,179,1,0.1); color: #F5B301; }
        .nbr-pop-icon {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            background: rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: rgba(255,255,255,0.55);
            transition: background 0.2s, color 0.2s;
        }
        .nbr-pop-link:hover .nbr-pop-icon { background: rgba(245,179,1,0.15); color: #F5B301; }
        .nbr-pop-divider {
            height: 1px;
            background: rgba(255,255,255,0.06);
            margin: 0.4rem 0;
        }
        .nbr-pop-logout {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            padding: 0.65rem;
            border-radius: 10px;
            background: rgba(239,68,68,0.08);
            color: #f87171;
            font-family: 'Roboto Condensed', sans-serif;
            font-weight: 800;
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-style: italic;
            border: none;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .nbr-pop-logout:hover { background: rgba(239,68,68,0.16); color: #fca5a5; }

        /* ─── Hamburger ─────────────────────────────────────── */
        .nbr-ham {
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding: 9px;
            background: transparent;
            border: none;
            cursor: pointer;
        }
        @media (min-width: 1024px) { .nbr-ham { display: none; } }
        .nbr-ham span {
            display: block;
            width: 26px;
            height: 2.5px;
            background: white;
            border-radius: 4px;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        .nbr-ham.open span:nth-child(1) { transform: translateY(7.5px) rotate(45deg); }
        .nbr-ham.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
        .nbr-ham.open span:nth-child(3) { transform: translateY(-7.5px) rotate(-45deg); }

        /* ─── Mobile Drawer ─────────────────────────────────── */
        .nbr-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.72);
            backdrop-filter: blur(5px);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .nbr-overlay.open { opacity: 1; visibility: visible; }

        .nbr-drawer {
            position: fixed;
            top: 0;
            right: 0;
            width: min(300px, 82vw);
            height: 100dvh;
            background: #153B6F;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            transform: translateX(105%);
            transition: transform 0.38s cubic-bezier(0.4,0,0.2,1);
            box-shadow: -12px 0 40px rgba(0,0,0,0.55);
        }
        .nbr-drawer.open { transform: translateX(0); }

        .nbr-drawer-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.25rem;
            border-bottom: 1px solid rgba(255,255,255,0.07);
            flex-shrink: 0;
        }
        .nbr-drawer-close {
            width: 34px;
            height: 34px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: rgba(255,255,255,0.55);
            transition: all 0.2s;
        }
        .nbr-drawer-close:hover { background: rgba(245,179,1,0.12); border-color: rgba(245,179,1,0.4); color: #F5B301; }

        .nbr-drawer-nav { flex: 1; overflow-y: auto; padding: 0.75rem 0.75rem; }

        .nbr-mob-link {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.9rem 1rem;
            border-radius: 10px;
            color: rgba(255,255,255,0.78);
            font-family: 'Roboto Condensed', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            text-decoration: none;
            font-style: italic;
            transition: background 0.2s, color 0.2s;
        }
        .nbr-mob-link:hover { background: rgba(245,179,1,0.1); color: #F5B301; }

        .nbr-mob-divider {
            height: 1px;
            background: rgba(255,255,255,0.07);
            margin: 0.5rem 0.5rem;
        }
        .nbr-mob-section-label {
            padding: 0.5rem 1rem 0.25rem;
            font-size: 0.65rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.28);
            font-weight: 700;
        }
        .nbr-mob-team-link {
            display: block;
            padding: 0.6rem 1rem;
            border-radius: 9px;
            font-size: 0.85rem;
            font-weight: 600;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            transition: background 0.15s, color 0.15s;
        }
        .nbr-mob-team-link:hover { background: rgba(245,179,1,0.08); color: rgba(245,179,1,0.9); }

        .nbr-drawer-foot {
            border-top: 1px solid rgba(255,255,255,0.07);
            padding: 1rem 1.25rem;
            flex-shrink: 0;
        }
        .nbr-mob-user-card {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            background: rgba(245,179,1,0.07);
            border: 1px solid rgba(245,179,1,0.15);

    <div class="nbr-overlay" id="nbrOverlay" onclick="nbrClose()"></div>

    <!-- Mobile Drawer -->

        <div class="nbr-drawer-head">

                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <nav class="nbr-drawer-nav">
            <!-- Public links (hidden for admin/coach) -->
            <div sec:authorize="!hasAnyRole('ADMIN','COACH','SOCIAL_ADMIN')">
                <a href="/news" class="nbr-mob-link">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0"><path d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10l6 6v8a2 2 0 01-2 2z"/><path d="M17 21v-8H7v8"/></svg>
                    Nyheter
                </a>
                <a href="/about" class="nbr-mob-link">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4m0-4h.01"/></svg>

                </a>
                <a href="/trial-registration" class="nbr-mob-link">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>

                <a href="/kontakt" class="nbr-mob-link">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>

            </div>

            <!-- Dashboard links (admin/coach only) -->
            <div sec:authorize="hasAnyRole('ADMIN','COACH','SOCIAL_ADMIN')">
                <a sec:authorize="hasRole('ADMIN')" href="/admin/dashboard" class="nbr-mob-link">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                    Dashboard

                <a sec:authorize="hasRole('COACH') and !hasRole('ADMIN')" href="/coach/dashboard" class="nbr-mob-link">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                    Dashboard
                </a>
            </div>
        </nav>

        <!-- Drawer Footer -->
        <div class="nbr-drawer-foot">
            <!-- Logged in -->
            <div sec:authorize="isAuthenticated()">
                <div class="nbr-mob-user-card">
                    <div class="nbr-mob-avatar">
                        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                    </div>
                    <div style="min-width:0">
                        <div style="font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.35);font-weight:700;">Inloggad som</div>
                        <div style="font-weight:700;font-size:0.9rem;color:white;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" sec:authentication="principal.username">Användare</div>
                    </div>
                </div>
                <a href="/my-profile" class="nbr-mob-link" style="margin-bottom:0.25rem;">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                    Min Profil
                </a>
                <form action="/logout" method="post">
                    <button type="submit" class="nbr-mob-logout">
                        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                        Logga ut
                    </button>
                </form>
            </div>
            <!-- Guest -->
            <div sec:authorize="!isAuthenticated()">
                <a href="/login" class="nbr-mob-login-btn">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                    Logga in
                </a>
            </div>
        </div>
    </div>

    <!-- ─── Main Navbar Bar ─────────────────────────────────── -->
    <div class="nbr">

        <!-- Logo -->
        <a href="/" class="nbr-logo">
            <img src="/images/FBK_BALKAN_logo.png" alt="FBK Balkan">
        </a>

        <!-- Desktop Center Links -->
        <nav class="nbr-links">
            <!-- Public links -->
            <div sec:authorize="!hasAnyRole('ADMIN','COACH','SOCIAL_ADMIN')" style="display:flex;align-items:center;gap:2.5rem;">
                <a href="/news" class="nbr-link">Nyheter</a>
                <a href="/about" class="nbr-link">Om Klubben</a>
                <a href="/trial-registration" class="nbr-link">Intresseanmälan</a>
                <div class="nbr-dropdown-wrap">
                    <button class="nbr-dropdown-btn">

                        <svg class="nbr-chevron" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
                    </button>
                    <div class="nbr-dropdown-menu">
                        <a th:each="team : ${navbarTeams}" th:href="@{/public-teams/{id}(id=${team.id})}"
                           th:text="${team.ageGroup}" class="nbr-dropdown-item"></a>
                        <div th:if="${navbarTeams == null or #lists.isEmpty(navbarTeams)}"
                             class="nbr-dropdown-item" style="color:rgba(255,255,255,0.35);pointer-events:none;">
                            Inga lag tillgängliga
                        </div>
                    </div>
                </div>
            </div>
            <!-- Admin/coach: dashboard link only -->
            <div sec:authorize="hasAnyRole('ADMIN','COACH','SOCIAL_ADMIN')" style="display:flex;align-items:center;gap:2rem;">
                <a sec:authorize="hasRole('ADMIN')" href="/admin/dashboard" class="nbr-link">Dashboard</a>
                <a sec:authorize="hasRole('COACH') and !hasRole('ADMIN')" href="/coach/dashboard" class="nbr-link">Dashboard</a>
            </div>
        </nav>

        <!-- Right: Login / Avatar + Hamburger -->
        <div class="nbr-right">
            <!-- Guest: login button (desktop) -->
            <div sec:authorize="!isAuthenticated()">
                <a href="/login" class="nbr-login-btn">
                    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                    Logga in
                </a>
            </div>

            <!-- Authenticated: avatar + popover (desktop) -->
            <div sec:authorize="isAuthenticated()" class="nbr-avatar-wrap">
                <button class="nbr-avatar-btn" aria-label="Profil">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                </button>
                <div class="nbr-popover">
                    <div class="nbr-popover-header">
                        <div class="nbr-popover-label">Inloggad</div>
                        <div class="nbr-popover-username" sec:authentication="principal.username">Användare</div>
                    </div>
                    <div class="nbr-popover-body">
                        <a href="/my-profile" class="nbr-pop-link">
                        <span class="nbr-pop-icon">
                            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                        </span>
                            Min Profil
                        </a>
                        <!-- Admin/Coach dashboard links -->
                        <div sec:authorize="hasAnyRole('ADMIN','COACH','SOCIAL_ADMIN')">
                            <div class="nbr-pop-divider"></div>
                            <p style="padding:0.35rem 0.75rem 0.2rem;font-size:0.6rem;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.25);font-weight:700;">Administration</p>
                            <a sec:authorize="hasRole('ADMIN')" href="/admin/dashboard" class="nbr-pop-link">
                            <span class="nbr-pop-icon" style="background:rgba(245,179,1,0.1);color:#F5B301;">
                                <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                            </span>
                                Admin Dashboard
                            </a>
                            <a sec:authorize="hasRole('COACH') and !hasRole('ADMIN')" href="/coach/dashboard" class="nbr-pop-link">
                            <span class="nbr-pop-icon" style="background:rgba(245,179,1,0.1);color:#F5B301;">
                                <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                            </span>
                                Coach Dashboard
                            </a>
                        </div>
                        <div class="nbr-pop-divider"></div>
                        <form action="/logout" method="post">
                            <button type="submit" class="nbr-pop-logout">
                                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                                Logga ut
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Hamburger (mobile only) -->
            <button class="nbr-ham" id="nbrHam" onclick="nbrToggle()" aria-label="Meny">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </div>

    <script>
        function nbrToggle() {
            const open = document.getElementById('nbrDrawer').classList.toggle('open');
            document.getElementById('nbrOverlay').classList.toggle('open', open);
            document.getElementById('nbrHam').classList.toggle('open', open);
            document.body.style.overflow = open ? 'hidden' : '';
        }
        function nbrClose() {
            document.getElementById('nbrDrawer').classList.remove('open');
            document.getElementById('nbrOverlay').classList.remove('open');
            document.getElementById('nbrHam').classList.remove('open');
            document.body.style.overflow = '';
        }
        window.addEventListener('resize', () => { if (window.innerWidth >= 1024) nbrClose(); });
    </script>

</header>
