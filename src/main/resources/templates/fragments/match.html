<!-- Upcoming Matches Section (Carousel Version) -->
<div th:fragment="upcoming-match" class="w-full relative group px-4 md:px-0">

  <!-- Section Header -->
  <div class="flex items-center justify-between mb-6 px-4">
    <h3 class="text-white text-xl font-bold uppercase tracking-wider flex items-center gap-2">
      <span class="w-2 h-8 bg-secondary rounded-full"></span>
      Kommande Matcher
    </h3>
    <a href="/matcher" class="text-sm text-gray-300 hover:text-white underline underline-offset-4">
      Visa alla
    </a>
  </div>

  <!-- Navigation Buttons -->
  <button onclick="scrollCarousel('upcoming-slider', -340)"
          class="absolute left-2 top-1/2 -translate-y-1/2 z-30 bg-black/60 hover:bg-secondary p-2 text-white rounded-full transition-all opacity-0 group-hover:opacity-100 hidden md:block border border-white/10">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" class="w-5 h-5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
    </svg>
  </button>

  <button onclick="scrollCarousel('upcoming-slider', 340)"
          class="absolute right-2 top-1/2 -translate-y-1/2 z-30 bg-black/60 hover:bg-secondary p-2 text-white rounded-full transition-all opacity-0 group-hover:opacity-100 hidden md:block border border-white/10">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" class="w-5 h-5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
    </svg>
  </button>

  <!-- Carousel Container -->
  <div id="upcoming-slider" class="flex overflow-x-auto scroll-smooth gap-4 no-scrollbar p-4">

    <!-- Upcoming Match Card -->
    <div th:each="match : ${matches}"
         th:if="${match.goalsScoredHomeTeam == -1}"
         class="flex-none w-[280px] md:w-[320px] bg-white/5 backdrop-blur-md rounded-2xl border border-white/10 p-5 hover:bg-white/10 transition-all">

      <!-- Date & Venue -->
      <div class="flex flex-col gap-1 mb-4">
        <div class="flex items-center justify-between">
                    <span class="bg-secondary text-black text-[10px] font-black px-2 py-0.5 rounded uppercase"
                          th:text="${#temporals.format(match.timeAsDateTime, 'dd MMM')}">12 APR</span>
          <span class="text-white/60 text-xs font-bold"
                th:text="${#temporals.format(match.timeAsDateTime, 'HH:mm')}">14:00</span>
        </div>
        <div class="flex items-center gap-1 text-[10px] text-white/40 mt-2">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
          </svg>
          <!--          <span th:text="${match.venue != null ? match.venue : 'Kirsebergs IP'}" class="truncate">Kirsebergs IP</span>-->
        </div>
      </div>

      <!-- Teams Area -->
      <div class="space-y-4">
        <!-- Home -->
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-white rounded-lg p-1.5 shadow-inner">
            <img th:src="${match.homeTeamImageUrl}" alt="Home" class="w-full h-full object-contain">
          </div>
          <span th:text="${match.homeTeamName}" class="font-virage font-bold text-sm text-white truncate">FBK Balkan</span>
        </div>

        <div class="relative flex justify-center">
          <span class="absolute inset-y-1/2 w-full h-[1px] bg-white/10"></span>
          <span class="relative bg-[#1a1a1a] px-3 text-[10px] font-black text-white/30 italic">VS</span>
        </div>

        <!-- Away -->
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-white rounded-lg p-1.5 shadow-inner">
            <img th:src="${match.awayTeamImageUrl}" alt="Away" class="w-full h-full object-contain">
          </div>
          <span th:text="${match.awayTeamName}" class="font-virage font-bold text-sm text-white truncate">Råå IF</span>
        </div>
      </div>

      <!-- Action Button -->
      <div class="mt-6">
        <a th:href="@{'/match-details/' + ${match.gameNumber}}"
           class="block text-center bg-white/10 hover:bg-secondary hover:text-black py-2 rounded-lg text-xs font-bold transition-colors uppercase tracking-widest">
          Matchdetaljer
        </a>
      </div>
    </div>
  </div>

  <!-- Reusable Script (Only needs to be in the file once) -->
  <script>
    function scrollCarousel(id, distance) {
      const container = document.getElementById(id);
      container.scrollBy({ left: distance, behavior: 'smooth' });
    }
  </script>
</div>



<!-- Match Results Carousel Section -->
<div th:fragment="match-result" class="relative w-full group">

  <!-- Left Button -->
  <button onclick="scrollCarousel('match-slider', -340)"
          class="absolute left-0 top-1/2 -translate-y-1/2 z-30 bg-black/50 hover:bg-secondary p-2 text-white rounded-r-lg transition-all opacity-0 group-hover:opacity-100 hidden md:block">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-6 h-6">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
    </svg>
  </button>

  <!-- Carousel Container -->
  <div id="match-slider" class="flex overflow-x-auto scroll-smooth gap-5 no-scrollbar p-2">

    <!-- Match Card Loop -->
    <div  th:each="match : ${matches}"
          class="flex-none w-[300px] md:w-[320px]">

      <div class="bg-base-200/95 backdrop-blur-sm rounded-xl border border-white/10 p-5 hover:border-secondary/50 transition-all shadow-xl">
        <a th:href="@{'/match-details/' + ${match.gameNumber}}" class="block">
          <!-- Header -->
          <div class="flex items-center justify-between border-b border-white/10 pb-2 mb-3">
            <div class="flex items-center gap-2">
              <span class="h-1.5 w-1.5 rounded-full bg-secondary"></span>
              <span class="text-[10px] font-bold uppercase tracking-widest opacity-60">Resultat</span>
            </div>
            <span th:text="${#temporals.format(match.timeAsDateTime, 'd MMM')}" class="text-[10px] font-bold opacity-60 uppercase"></span>
          </div>

          <!-- Teams Row -->
          <div class="space-y-3">
            <div class="flex items-center justify-between">
              <div class="flex items-center gap-3">
                <img th:src="${match.homeTeamImageUrl}" class="h-8 w-8 object-contain" alt="">
                <span th:text="${match.homeTeamName}" class="font-virage italic font-bold text-sm truncate w-32"></span>
              </div>
              <span th:text="${match.goalsScoredHomeTeam}" class="text-xl font-black text-secondary"></span>
            </div>
            <div class="flex items-center justify-between">
              <div class="flex items-center gap-3">
                <img th:src="${match.awayTeamImageUrl}" class="h-8 w-8 object-contain" alt="">
                <span th:text="${match.awayTeamName}" class="font-virage italic font-bold text-sm truncate w-32"></span>
              </div>
              <span th:text="${match.goalsScoredAwayTeam}" class="text-xl font-black text-secondary"></span>
            </div>
          </div>

          <div class="mt-4 text-center">
            <span class="text-[10px] font-bold uppercase tracking-tighter text-white/40 group-hover:text-secondary">Visa Matchdetaljer →</span>
          </div>
        </a>
      </div>
    </div>
  </div>

  <!-- Right Button -->
  <button onclick="scrollCarousel('match-slider', 340)"
          class="absolute right-0 top-1/2 -translate-y-1/2 z-30 bg-black/50 hover:bg-secondary p-2 text-white rounded-l-lg transition-all opacity-0 group-hover:opacity-100 hidden md:block">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-6 h-6">
      <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
    </svg>
  </button>


</div>


<!-- START OF FRAGMENT: match-list -->
<div th:fragment="match-calendar-list(matches)" class="space-y-3">
  <!-- Match Row -->
  <div th:each="match : ${matches}"
       class="group relative bg-primary flex flex-col md:flex-row items-center gap-4  hover:bg-neutral/10 border border-white/10 p-4 md:p-6 transition-all duration-300 rounded-xl overflow-hidden">

    <!-- Subtle Glow Effect on Hover -->
    <div class="absolute inset-0 bg-gradient-to-r from-secondary/0 via-secondary/5 to-secondary/0 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none"></div>

    <!-- 1. Date Block -->
    <div class="flex flex-row md:flex-col items-center justify-center min-w-[80px] text-center border-b md:border-b-0 md:border-r border-white/10 pb-2 md:pb-0 md:pr-6">
            <span class="text-secondary font-black text-2xl md:text-3xl leading-none italic uppercase"
                  th:text="${#temporals.format(match.timeAsDateTime, 'dd')}">14</span>
      <span class="text-white/60 font-bold text-xs uppercase tracking-widest ml-2 md:ml-0"
            th:text="${#temporals.format(match.timeAsDateTime, 'MMM')}">MAJ</span>
    </div>

    <!-- 2. Competition -->
    <div class="flex items-center gap-3 md:w-1/4">
      <div class="flex flex-col">
        <span class="text-white text-xs font-bold truncate" th:text="${match.competitionName != null ? match.competitionName : 'Division 2'}">Division 2 Södra Götaland</span>
      </div>
    </div>

    <!-- 3. The Matchup (Main Focus) -->
    <div class="flex-1 flex items-center justify-center gap-4 md:gap-8 w-full py-4 md:py-0">
      <!-- Home -->
      <div class="flex flex-1 items-center justify-end gap-3 text-right">
        <span class="text-white font-bold text-sm md:text-lg uppercase italic tracking-tight truncate max-w-[120px] md:max-w-none" th:text="${match.homeTeamName}">FBK Balkan</span>
        <img th:src="${match.homeTeamImageUrl}" class="w-8 h-8 md:w-10 md:h-10 object-contain" alt="">
      </div>

      <!-- Score or VS -->
      <div class="flex flex-col items-center justify-center min-w-[60px] md:min-w-[100px]">
        <div th:if="${match.goalsScoredHomeTeam != -1}" class="bg-white/10 px-3 py-1 rounded text-xl md:text-2xl font-black text-secondary">
          <span th:text="${match.goalsScoredHomeTeam}">2</span>
          <span class="text-white/30 mx-1">-</span>
          <span th:text="${match.goalsScoredAwayTeam}">1</span>
        </div>
        <div th:if="${match.goalsScoredHomeTeam == -1}" class="flex flex-col items-center">
          <span class="text-white/20 font-black italic text-lg">VS</span>
          <span class="text-[10px] text-white/40 font-bold" th:text="${#temporals.format(match.timeAsDateTime, 'HH:mm')}">14:00</span>
        </div>
      </div>

      <!-- Away -->
      <div class="flex flex-1 items-center justify-start gap-3 text-left">
        <img th:src="${match.awayTeamImageUrl}" class="w-8 h-8 md:w-10 md:h-10 object-contain" alt="">
        <span class="text-white font-bold text-sm md:text-lg uppercase italic tracking-tight truncate max-w-[120px] md:max-w-none" th:text="${match.awayTeamName}">IFK Malmö</span>
      </div>
    </div>

    <!-- 4. CTA -->
    <div class="md:w-1/6 flex justify-end">
      <a th:href="@{'/match-details/' + ${match.gameNumber}}"
         class="btn btn-sm md:btn-md btn-outline border-white/20 text-white hover:bg-secondary hover:text-navy hover:border-secondary font-black uppercase italic tracking-widest text-[10px]">
        Visa detaljer
      </a>
    </div>
  </div>
</div>

<!-- NEW FRAGMENT: match-row-card (Based on public-team.html design) -->
<div th:fragment="match-row-card(matches)" class="space-y-4">
  <div th:each="match : ${matches}"
       class="group bg-white border border-neutral-100 rounded-2xl p-5 md:p-8 hover:shadow-2xl hover:border-secondary/30 transition-all duration-300">

    <!-- Top Info: Date & Competition -->
    <div class="flex flex-wrap justify-between items-center text-[10px] font-bold uppercase tracking-[0.2em] mb-6 pb-4 border-b border-neutral-50">
      <div class="flex items-center gap-4">
        <div class="flex items-center gap-2 text-primary">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
          <span th:text="${#temporals.format(match.timeAsDateTime, 'dd MMM yyyy')}">12 APR 2024</span>
        </div>
        <span class="w-1 h-1 bg-neutral-200 rounded-full"></span>
        <span class="text-neutral-400" th:text="${match.competitionName}">Division 2 Södra</span>
      </div>

      <!-- Time Badge for upcoming matches -->
      <div th:if="${match.goalsScoredHomeTeam == -1}" class="bg-neutral-50 text-primary px-3 py-1 rounded-full flex items-center gap-2">
        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        <span th:text="${#temporals.format(match.timeAsDateTime, 'HH:mm')}">14:00</span>
      </div>
    </div>

    <!-- Main Match Row -->
    <div class="flex flex-col md:flex-row items-center justify-between gap-6 md:gap-4">

      <!-- Home Team -->
      <div class="flex flex-1 items-center gap-4 w-full md:justify-end">
        <span class="font-black text-xl md:text-2xl text-primary uppercase italic tracking-tighter order-2 md:order-1 text-left md:text-right flex-1 md:flex-none" th:text="${match.homeTeamName}">FBK Balkan</span>
        <div class="w-12 h-12 md:w-16 md:h-16 bg-neutral-50 rounded-xl p-2 flex items-center justify-center order-1 md:order-2 border border-neutral-100 group-hover:scale-110 transition-transform">
          <img th:src="${match.homeTeamImageUrl}" class="max-w-full max-h-full object-contain" alt="">
        </div>
      </div>

      <!-- Score / VS Center Area -->
      <div class="flex flex-col items-center justify-center min-w-[120px]">
        <!-- Played Match: Score -->
        <div th:if="${match.goalsScoredHomeTeam != -1}" class="flex items-center gap-3">
          <span class="text-4xl md:text-5xl font-black text-primary" th:text="${match.goalsScoredHomeTeam}">2</span>
          <span class="text-2xl font-black text-secondary">—</span>
          <span class="text-4xl md:text-5xl font-black text-primary" th:text="${match.goalsScoredAwayTeam}">0</span>
        </div>

        <!-- Upcoming Match: VS Badge -->
        <div th:if="${match.goalsScoredHomeTeam == -1}" class="relative">
          <div class="px-6 py-2 bg-primary text-white text-xs font-black italic rounded-lg skew-x-[-12deg] shadow-lg shadow-primary/20">
            VS
          </div>
        </div>
      </div>

      <!-- Away Team -->
      <div class="flex flex-1 items-center gap-4 w-full md:justify-start">
        <div class="w-12 h-12 md:w-16 md:h-16 bg-neutral-50 rounded-xl p-2 flex items-center justify-center border border-neutral-100 group-hover:scale-110 transition-transform">
          <img th:src="${match.awayTeamImageUrl}" class="max-w-full max-h-full object-contain" alt="">
        </div>
        <span class="font-black text-xl md:text-2xl text-primary uppercase italic tracking-tighter text-left flex-1 md:flex-none" th:text="${match.awayTeamName}">Helsingborg FC</span>
      </div>
    </div>

    <!-- Footer: Action Link -->
    <div class="mt-8 pt-4 border-t border-neutral-50 flex justify-center">
      <a th:href="@{'/match-details/' + ${match.gameNumber}}"
         class="text-[10px] font-black uppercase tracking-[0.3em] text-neutral-400 hover:text-secondary transition-colors flex items-center gap-2 group/link">
        Se Matchcenter
        <svg class="w-3 h-3 transform group-hover/link:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"/></svg>
      </a>
    </div>
  </div>
</div>
