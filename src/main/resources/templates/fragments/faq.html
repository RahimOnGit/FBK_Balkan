
<div th:fragment="faqList(faqs)">
  <div class="flex flex-col gap-4">

    <!-- Loop through FAQs -->
    <div th:each="faq : ${faqs}" class="faq-item bg-base-200 rounded-2xl shadow-sm border border-base-300 hover:shadow-xl hover:border-secondary transition-all duration-300">

      <!-- Question Button -->
      <button type="button" class="faq-question w-full flex justify-between items-center p-4 sm:p-6 text-left">
        <span class="text-lg sm:text-xl font-bold text-primary" th:text="${faq.question}"></span>

        <!-- Arrow icon -->
        <svg class="faq-icon w-5 sm:w-6 h-5 sm:h-6 text-secondary transition-transform duration-300"
             fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
        </svg>
      </button>

      <!-- Divider -->
      <div class="faq-divider border-t border-base-300 mx-4 sm:mx-6"
           style="opacity: 0; transition: opacity 0.3s ease;"></div>

      <!-- Answer -->
      <div class="faq-answer px-4 sm:px-6 overflow-hidden"
           style="max-height: 0; transition: max-height 0.5s ease;">
        <div class="pt-4 pb-4 sm:pb-6 text-base sm:text-base-content/80"
             th:text="${faq.answer}">
          <!-- Secure: Escaped text prevents XSS -->
        </div>
      </div>
    </div>
  </div>

  <!-- Accordion JS -->
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const items = document.querySelectorAll(".faq-item");

      items.forEach(item => {
        const button = item.querySelector(".faq-question");
        const answer = item.querySelector(".faq-answer");
        const icon = item.querySelector(".faq-icon");
        const divider = item.querySelector(".faq-divider");

        // Initially closed
        answer.style.maxHeight = "0px";
        icon.style.transform = "rotate(0deg)";
        divider.style.opacity = "0";

        button.addEventListener("click", function () {
          const isOpen = answer.style.maxHeight !== "0px";

          // Close all
          items.forEach(i => {
            i.querySelector(".faq-answer").style.maxHeight = "0px";
            i.querySelector(".faq-icon").style.transform = "rotate(0deg)";
            i.querySelector(".faq-divider").style.opacity = "0";
            i.classList.remove("border-secondary", "shadow-xl");
          });

          // Open clicked if it was closed
          if (!isOpen) {
            answer.style.maxHeight = answer.scrollHeight + "px";
            icon.style.transform = "rotate(180deg)";
            divider.style.opacity = "1";
            item.classList.add("border-secondary", "shadow-xl");
          }
        });
      });
    });
  </script>
</div>
