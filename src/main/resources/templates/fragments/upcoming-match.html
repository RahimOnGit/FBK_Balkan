<div th:fragment="upcoming-match">

  <!-- Upcoming Matches Section - Clean & Professional -->
  <div class="w-full max-w-4xl mx-auto">

    <!-- Section Header -->
    <div class="flex items-center justify-between mb-6 px-4">
      <h3 class="text-white text-xl md:text-2xl font-bold uppercase tracking-wider flex items-center gap-2">
        <span class="w-2 h-8 bg-secondary rounded-full"></span>
        Kommande Matcher
      </h3>
      <a href="/matcher" class="text-sm text-gray-300 hover:text-white transition-colors underline underline-offset-4">
        Visa alla
      </a>
    </div>

    <!-- Match Cards Container -->
    <div class="space-y-4 px-4">


      <!-- Match Card -->
      <div class="group bg-white/10 backdrop-blur-md rounded-xl p-5 border border-white/20 hover:bg-white/15 transition-all duration-300">

        <!-- Date & Venue -->
        <div class="flex justify-between items-center mb-4 text-white/70 text-xs font-medium">
          <div class="flex items-center gap-2">
            <span>12 April 2026</span>
            <span class="text-white/30">|</span>
            <span>14:00</span>
          </div>
          <span class="flex items-center gap-1.5">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
            </svg>
            Kirsebergs IP
          </span>
        </div>

        <!-- Teams Row -->
        <div class="flex items-center justify-between gap-2">
          <div class="flex flex-col items-center gap-2 flex-1">
            <div class="w-16 h-16 bg-white rounded-xl p-2 flex items-center justify-center shadow-md">
              <img alt="Råå IF" src="https://staticcdn.svenskfotboll.se/img/teamssm/8117.png" class="w-full h-full object-contain">
            </div>
            <span class="text-white font-semibold text-xs text-center leading-tight">Råå IF</span>
          </div>

          <div class="flex flex-col items-center gap-1 px-2 flex-shrink-0">
            <span class="text-white/30 font-black text-xs tracking-widest uppercase">VS</span>
          </div>

          <div class="flex flex-col items-center gap-2 flex-1">
            <div class="w-16 h-16 bg-white rounded-xl p-2 flex items-center justify-center shadow-md">
              <img alt="FBK Balkan" src="https://staticcdn.svenskfotboll.se/img/teams/11605.png" class="w-full h-full object-contain">
            </div>
            <span class="text-white font-semibold text-xs text-center leading-tight">FBK Balkan</span>
          </div>
        </div>
      </div>


    </div>



  </div>

</div>
