<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<body>

<style th:fragment="sidebar-styles">
    .dashboard-wrapper {
        display: flex;
        min-height: 100vh;
    }
    .sidebar {
        width: 260px;
        min-width: 260px;
        background: #153B6F;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        position: sticky;
        top: 0;
        height: 100vh;
        overflow-y: auto;
        z-index: 50;
        box-shadow: 4px 0 20px rgba(0,0,0,0.15);
    }
    .sidebar-logo {
        padding: 1.5rem 1.25rem 1rem;
        border-bottom: 1px solid rgba(255,255,255,0.08);
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .sidebar-logo img {
        height: 52px;
        transition: transform 0.3s;
    }
    .sidebar-logo img:hover {
        transform: scale(1.05);
    }
    .sidebar-user {
        padding: 1rem 1.25rem;
        background: rgba(0,0,0,0.15);
        border-bottom: 1px solid rgba(255,255,255,0.06);
        display: flex;
        align-items: center;
        gap: 0.75rem;
    }
    .sidebar-user-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: rgba(245,179,1,0.15);
        border: 1.5px solid rgba(245,179,1,0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #F5B301;
        flex-shrink: 0;
    }
    .sidebar-user-label {
        font-size: 0.62rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.35);
        font-weight: 700;
        line-height: 1;
        margin-bottom: 0.2rem;
    }
    .sidebar-username {
        font-size: 0.85rem;
        font-weight: 700;
        color: white;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 160px;
    }
    .sidebar-nav {
        flex: 1;
        padding: 1.25rem 0.75rem;
        display: flex;
        flex-direction: column;
        gap: 0.2rem;
    }
    .sidebar-link {
        display: flex;
        align-items: center;
        gap: 0.85rem;
        padding: 0.75rem 1rem;
        border-radius: 10px;
        color: rgba(255,255,255,0.7);
        font-size: 0.875rem;
        font-weight: 600;
        text-decoration: none;
        letter-spacing: 0.04em;
        transition: all 0.2s ease;
        position: relative;
    }
    .sidebar-link:hover {
        background: rgba(245,179,1,0.1);
        color: #F5B301;
    }
    .sidebar-link.active {
        background: rgba(245,179,1,0.15);
        color: #F5B301;
        border: 1px solid rgba(245,179,1,0.25);
    }
    .sidebar-link.active .sidebar-icon {
        color: #F5B301;
    }
    .sidebar-icon {
        width: 18px;
        height: 18px;
        flex-shrink: 0;
        color: rgba(255,255,255,0.5);
        transition: color 0.2s;
    }
    .sidebar-link:hover .sidebar-icon {
        color: #F5B301;
    }
    .sidebar-divider {
        height: 1px;
        background: rgba(255,255,255,0.07);
        margin: 0.6rem 0.5rem;
    }
    .sidebar-section-label {
        padding: 0.5rem 1rem 0.3rem;
        font-size: 0.65rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.25);
        font-weight: 700;
    }
    .sidebar-logout {
        color: rgba(239,68,68,0.8) !important;
    }
    .sidebar-logout:hover {
        background: rgba(239,68,68,0.1) !important;
        color: #f87171 !important;
    }
    .sidebar-logout .sidebar-icon {
        color: rgba(239,68,68,0.6);
    }
    .sidebar-logout:hover .sidebar-icon {
        color: #f87171;
    }
    .sidebar-footer {
        padding: 1rem 1.25rem;
        border-top: 1px solid rgba(255,255,255,0.06);
    }
    .dashboard-main {
        flex: 1;
        min-width: 0;
        background: #f1f5f9;
        display: flex;
        flex-direction: column;
    }
    .dashboard-topbar {
        background: white;
        border-bottom: 1px solid #e2e8f0;
        padding: 0.85rem 1.75rem;
        display: flex;
        align-items: center;
        justify-content: between;
        gap: 1rem;
        position: sticky;
        top: 0;
        z-index: 40;
        box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .dashboard-topbar-title {
        font-size: 1rem;
        font-weight: 700;
        color: #1e293b;
        letter-spacing: 0.02em;
        flex: 1;
    }
    .dashboard-content {
        flex: 1;
        padding: 2rem 1.75rem;
    }
    @media (max-width: 768px) {
        .sidebar {
            display: none;
        }
        .dashboard-content {
            padding: 1rem;
        }
    }
    .badge-count {
        margin-left: auto;
        background: #F5B301;
        color: #153B6F;
        font-size: 0.65rem;
        font-weight: 800;
        padding: 0.15rem 0.5rem;
        border-radius: 999px;
        min-width: 20px;
        text-align: center;
    }
</style>

<aside th:fragment="sidebar(activePage)" class="sidebar">
    <div class="sidebar-logo">
        <a href="/">
            <img src="/images/FBK_BALKAN_logo.png" alt="FBK Balkan">
        </a>
    </div>

    <div class="sidebar-user">
        <div class="sidebar-user-avatar">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
        </div>
        <div style="min-width:0">
            <div class="sidebar-user-label">Inloggad som</div>
            <div class="sidebar-username" sec:authentication="principal.username">Användare</div>
        </div>
    </div>

    <nav class="sidebar-nav">

        <!-- Dashboard -->
        <a sec:authorize="hasRole('ADMIN')" href="/admin/dashboard"
           th:class="'sidebar-link' + (${activePage == 'dashboard'} ? ' active' : '')">
            <svg class="sidebar-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <rect x="3" y="3" width="7" height="7" rx="1"/>
                <rect x="14" y="3" width="7" height="7" rx="1"/>
                <rect x="3" y="14" width="7" height="7" rx="1"/>
                <rect x="14" y="14" width="7" height="7" rx="1"/>
            </svg>
            Dashboard
        </a>
        <a sec:authorize="hasRole('COACH') and !hasRole('ADMIN')" href="/coach/dashboard"
           th:class="'sidebar-link' + (${activePage == 'dashboard'} ? ' active' : '')">
            <svg class="sidebar-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <rect x="3" y="3" width="7" height="7" rx="1"/>
                <rect x="14" y="3" width="7" height="7" rx="1"/>
                <rect x="3" y="14" width="7" height="7" rx="1"/>
                <rect x="14" y="14" width="7" height="7" rx="1"/>
            </svg>
            Dashboard
        </a>
        <a sec:authorize="hasRole('SOCIAL_ADMIN')" href="/socialadmin/dashboard"
           th:class="'sidebar-link' + (${activePage == 'dashboard'} ? ' active' : '')">
            <svg class="sidebar-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <rect x="3" y="3" width="7" height="7" rx="1"/>
                <rect x="14" y="3" width="7" height="7" rx="1"/>
                <rect x="3" y="14" width="7" height="7" rx="1"/>
                <rect x="14" y="14" width="7" height="7" rx="1"/>
            </svg>
            Dashboard
        </a>

        <div class="sidebar-divider"></div>

        <!-- News -->
        <a sec:authorize="hasRole('ADMIN')" href="/admin/news"
           th:class="'sidebar-link' + (${activePage == 'news'} ? ' active' : '')">
            <svg class="sidebar-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10l6 6v8a2 2 0 01-2 2z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M17 21v-8H7v8M7 4v4h8"/>
            </svg>
            Nyheter
            <span th:if="${pendingNewsCount != null and pendingNewsCount > 0}"
                  class="badge-count" th:text="${pendingNewsCount}">0</span>
        </a>
        <a sec:authorize="hasRole('COACH') and !hasRole('ADMIN')" href="/coach/news"
           th:class="'sidebar-link' + (${activePage == 'news'} ? ' active' : '')">
            <svg class="sidebar-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10l6 6v8a2 2 0 01-2 2z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M17 21v-8H7v8M7 4v4h8"/>
            </svg>
            Nyheter
        </a>
        <a sec:authorize="hasRole('SOCIAL_ADMIN')" href="/admin/news"
           th:class="'sidebar-link' + (${activePage == 'news'} ? ' active' : '')">
            <svg class="sidebar-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10l6 6v8a2 2 0 01-2 2z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M17 21v-8H7v8M7 4v4h8"/>
            </svg>
            Nyheter
        </a>
        <a sec:authorize="hasRole('SOCIAL_ADMIN')" href="/admin/news/create"
           th:class="'sidebar-link' + (${activePage == 'news-create'} ? ' active' : '')">
            <svg class="sidebar-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
            </svg>
            Ny nyhet
        </a>

        <!-- Trials -->
        <a sec:authorize="hasRole('ADMIN')" href="/admin/dashboard"
           th:class="'sidebar-link' + (${activePage == 'trials'} ? ' active' : '')">
            <svg class="sidebar-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
            </svg>
            Provträningar
            <span th:if="${pendingTrials != null and pendingTrials > 0}"
                  class="badge-count" th:text="${pendingTrials}">0</span>
        </a>
        <a sec:authorize="hasRole('COACH') and !hasRole('ADMIN')" href="/coach/dashboard?show=trials"
           th:class="'sidebar-link' + (${activePage == 'trials'} ? ' active' : '')">
            <svg class="sidebar-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
            </svg>
            Provträningar
            <span th:if="${pendingCount != null and pendingCount > 0}"
                  class="badge-count" th:text="${pendingCount}">0</span>
        </a>

        <!-- My Teams -->
        <a sec:authorize="hasRole('ADMIN')" href="/admin/teams"
           th:class="'sidebar-link' + (${activePage == 'teams'} ? ' active' : '')">
            <svg class="sidebar-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
            Mina Lag
        </a>
        <a sec:authorize="hasRole('COACH') and !hasRole('ADMIN')" href="/coach/dashboard?show=teams"
           th:class="'sidebar-link' + (${activePage == 'teams'} ? ' active' : '')">
            <svg class="sidebar-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
            Mina Lag
        </a>

        <div class="sidebar-divider"></div>

        <!-- Logout -->
        <form action="/logout" method="post" style="display:contents">
            <button type="submit" class="sidebar-link sidebar-logout"
                    style="width:100%;background:none;border:none;cursor:pointer;text-align:left;font-family:inherit;">
                <svg class="sidebar-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                </svg>
                Logga ut
            </button>
        </form>
    </nav>
</aside>

</body>
</html>
