<!DOCTYPE html>
<html lang="sv" data-theme="corporate" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glömt lösenord - FBK Balkan</title>
    <link th:href="@{/css/output.css}" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen bg-base-200">
<div class="absolute top-0 left-0 z-[10] right-0 bg-primary">
    <div th:replace="~{fragments/navbar::navbar}"></div>
</div>

<div class="min-h-screen flex items-center justify-center px-4 py-20">
    <div class="card w-full max-w-md bg-base-100 shadow-xl">
        <div class="card-body">
            <h2 class="card-title justify-center text-2xl mb-2">Glömt lösenord</h2>
            <p class="text-sm text-center text-base-content/70 mb-6">
                Ange din e-postadress så skickar vi en återställningslänk.
            </p>

            <div th:if="${success != null and success != false}" class="alert alert-success mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-6 w-6" fill="none" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <span th:text="${success}"></span>
            </div>

            <form th:if="${success == null or success == false}" th:action="@{/forgot-password}" method="post">
                <div class="form-control mb-6">
                    <label class="label">
                        <span class="label-text">E-post</span>
                    </label>
                    <input type="email" name="email" placeholder="namn@exempel.se"
                           class="input input-bordered w-full" required autofocus/>
                </div>

                <div class="form-control mb-3">
                    <button type="submit" class="btn btn-primary w-full">Skicka återställningslänk</button>
                </div>
            </form>

            <div class="text-center mt-2">
                <a th:href="@{/login}" class="link link-primary text-sm">← Tillbaka till login</a>
            </div>
        </div>
    </div>
</div>

<div class="mt-8">
    <div th:replace="~{fragments/footer::footer}"></div>
</div>
</body>
</html>
