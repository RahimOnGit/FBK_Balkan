<!DOCTYPE html>
<html lang="sv" data-theme="fbkbalkan" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nyheter - FBK Balkan Admin</title>

  <!-- DaisyUI & Tailwind -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.19/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts (Matching list.html) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Oswald:wght@500;700&display=swap" rel="stylesheet">

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- SweetAlert2 CDN -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <link th:href="@{/css/output.css}" rel="stylesheet">

  <!-- Tailwind Config (Matching list.html) -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            heading: ['Oswald', 'sans-serif'],
          },
          colors: {
            primary: {
              500: '#1e3a8a',
              600: '#1e3a8a',
            },
            secondary: '#475569',
          }
        }
      }
    }
  </script>

  <style>
    header .navbar a:hover {
      color: #fdad3a !important;
      transition: color 0.3s ease;
    }
    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body class="min-h-screen bg-base-200 flex flex-col">

<!-- Navbar Fragment -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- Main Content -->
<main class="flex-grow container mx-auto px-4 py-6 md:py-10 max-w-7xl mt-4">

  <!-- Page Header -->
  <div class="mb-8">
    <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-4">
      <div>
        <h1 class="text-4xl md:text-5xl font-heading font-bold text-slate-900 uppercase tracking-tight leading-tight">
          Nyheter
        </h1>
        <p class="text-slate-500 mt-2 font-medium max-w-lg">
          Skapa, redigera och hantera nyheter för webbplatsen.
        </p>
      </div>

      <div class="flex-shrink-0">
        <a th:href="@{/admin/news/create}"
           class="btn btn-primary btn-md h-12 rounded-xl bg-primary-600 hover:bg-primary-700 text-white border-none shadow-lg shadow-primary-500/30 hover:shadow-primary-500/50 font-bold gap-2 px-6">
          <i class="fa-solid fa-plus"></i>
          Ny Nyhet
        </a>
      </div>
    </div>
  </div>

  <!-- Alert Messages -->
  <div th:if="${success}" class="alert alert-success mb-6 shadow-lg border-none fade-in">
    <i class="fa-solid fa-check-circle"></i>
    <span th:text="${success}"></span>
  </div>
  <div th:if="${error}" class="alert alert-error mb-6 shadow-lg border-none fade-in">
    <i class="fa-solid fa-exclamation-triangle"></i>
    <span th:text="${error}"></span>
  </div>

  <!-- Main Card Container -->
  <div class="card bg-base-100 shadow-lg border border-slate-200 rounded-3xl overflow-hidden">
    <div class="card-body p-6">

      <!-- News Grid -->
      <div th:if="${!#lists.isEmpty(newsList)}" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

        <!-- News Item Card -->
        <div th:each="news : ${newsList}" class="bg-slate-50 border border-slate-200 rounded-2xl overflow-hidden flex flex-col hover:shadow-md transition-all duration-200 group">

          <!-- Image Area -->
          <div class="relative h-48 bg-slate-200 overflow-hidden">
            <img th:if="${news.displayImageUrl != null}"
                 th:src="${news.displayImageUrl}"
                 alt="Nyhetsbild"
                 class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300">

            <!-- Placeholder if no image -->
            <div th:unless="${news.displayImageUrl != null}" class="w-full h-full flex items-center justify-center bg-primary/5">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-primary/20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z" />
              </svg>
            </div>

            <!-- Category Badge Example (Optional visual flair) -->
            <div class="absolute top-3 left-3">
                            <span class="bg-primary text-white text-[10px] font-bold px-2 py-1 rounded-md uppercase tracking-wider shadow-sm">
                                Nyhet
                            </span>
            </div>
          </div>

          <!-- Content Area -->
          <div class="p-5 flex flex-col flex-grow">
            <p class="text-xs text-slate-400 font-semibold uppercase tracking-wider mb-1"
               th:text="${#temporals.format(news.createdAt, 'yyyy-MM-dd HH:mm')}">2023-01-01 12:00</p>

            <h2 class="font-heading font-bold text-lg text-slate-800 mb-2 leading-tight line-clamp-2" th:text="${news.title}">Titel</h2>

            <p class="text-sm text-slate-500 line-clamp-3 mb-4 flex-grow" th:text="${news.content}">Innehåll...</p>

            <!-- Actions Footer -->
            <div class="border-t border-slate-200 pt-4 mt-auto flex items-center justify-between">
              <a th:href="@{/news/{id}(id=${news.id})}"
                 class="text-sm font-semibold text-primary hover:text-primary/80 transition-colors flex items-center gap-1">
                <i class="fa-regular fa-eye"></i> Visa
              </a>

              <div class="flex items-center gap-1">
                <!-- Edit Button -->
                <a th:href="@{/admin/news/edit/{id}(id=${news.id})}"
                   class="btn btn-sm btn-circle btn-ghost text-slate-400 hover:text-primary hover:bg-primary/10 transition-colors"
                   title="Redigera">
                  <i class="fa-regular fa-pen-to-square text-lg"></i>
                </a>

                <!-- Delete Button -->
                <button type="button"
                        th:attr="data-id=${news.id}, data-name=${news.title}"
                        onclick="confirmDeleteNews(this)"
                        class="btn btn-sm btn-circle btn-ghost text-slate-400 hover:text-rose-500 hover:bg-rose-50 transition-colors"
                        title="Ta bort">
                  <i class="fa-regular fa-trash-can text-lg"></i>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Empty State -->
      <div th:if="${#lists.isEmpty(newsList)}" class="flex flex-col items-center justify-center py-20 text-center px-6 bg-slate-50/50">
        <div class="relative w-20 h-20 mb-6">
          <div class="absolute inset-0 bg-primary/5 rounded-full"></div>
          <div class="absolute inset-0 flex items-center justify-center">
            <i class="fa-solid fa-newspaper text-4xl text-primary/30"></i>
          </div>
        </div>
        <h3 class="font-heading font-bold text-xl text-slate-800 mb-1">Inga nyheter hittades</h3>
        <p class="text-slate-500 text-sm mb-6 max-w-sm">Det finns inga publicerade nyheter ännu.</p>
        <a th:href="@{/admin/news/create}" class="btn btn-primary btn-sm rounded-xl shadow-md">
          <i class="fa-solid fa-plus mr-2"></i> Skapa den första
        </a>
      </div>

    </div>
  </div>

</main>

<!-- Footer Fragment -->
<div th:replace="~{fragments/footer::footer}"></div>

<!-- Hidden Form for Deletion -->
<form id="deleteForm" method="post" style="display: none;">
  <input type="hidden" name="_method" value="delete"/>
</form>

<script>
  function confirmDeleteNews(button) {
    const newsId = button.getAttribute('data-id');
    const newsTitle = button.getAttribute('data-name');
    // Adjust URL to your specific delete mapping
    const deleteUrl = `/admin/news/delete/${newsId}`;

    Swal.fire({
      title: 'Radera nyhet?',
      html: `Är du säker på att du vill ta bort <strong class="text-slate-800">${newsTitle}</strong>?<br>Denna åtgärd kan inte ångras!`,
      icon: 'warning',
      showCancelButton: true,
      confirmButtonColor: '#dc2626', // Red color for destructive action
      cancelButtonColor: '#64748b',
      confirmButtonText: '<i class="fa-solid fa-trash-can mr-2"></i> Ja, ta bort!',
      cancelButtonText: 'Avbryt',
      customClass: {
        popup: 'rounded-3xl font-sans',
        confirmButton: 'btn btn-error rounded-xl shadow-lg border-none text-white',
        cancelButton: 'btn btn-ghost rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-700'
      },
      showClass: {
        popup: 'animate__animated animate__zoomIn animate__faster'
      }
    }).then((result) => {
      if (result.isConfirmed) {
        const form = document.createElement('form');
        form.method = 'POST';
        form.action = deleteUrl;
        document.body.appendChild(form);
        form.submit();
      }
    });
  }
</script>

</body>
</html>
