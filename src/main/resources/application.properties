
spring.application.name=FBK Balkan


# Database Configuration for SQLite
spring.datasource.url=jdbc:sqlite:fbkbalkan.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=


# JPA Configuration
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false


# H2 Console (disabled for SQLite)
spring.h2.console.enabled=false


server.port=${PORT:8080}


#set session timeout to 5 minutes
server.servlet.session.timeout=30m
server.tomcat.max-parameter-count=500


# ====================== Multipart File Upload ======================


spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB


# FileCountLimitExceededException
server.tomcat.max-part-count=50


# Improved performance when uploading large files
spring.servlet.multipart.resolve-lazily=true


