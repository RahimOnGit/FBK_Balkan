spring.application.name=FBK_Balkan



#postgre setup
# Main connection URL

# render : spring.datasource.url=${DATABASE_URL}?prepareThreshold=0&preparedStatementCacheQueries=0&preparedStatementCacheSize=0
spring.datasource.url=${SPRING_DATASOURCE_URL}?prepareThreshold=0&preparedStatementCacheQueries=0&preparedStatementCacheSize=0

# Force the settings down to the driver through Hikari
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.data-source-properties.preparedStatementCacheQueries=0
spring.datasource.hikari.data-source-properties.preparedStatementCacheSize=0

# Hibernate Query Cache Settings
spring.jpa.properties.hibernate.query.plan_cache_max_size=2048
spring.jpa.properties.hibernate.query.plan_parameter_metadata_max_size=256

# Additional Hibernate safety
spring.jpa.properties.hibernate.jdbc.use_streams_for_binary=false


spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
#spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

#added this to avoid connection issues >> supabase uses connection pooling
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#server.port=10000


spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB


# Port for Render
#server.port=${PORT:8080}

server.port=${PORT:10000}


